<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6F0" />
  <title>去玩咯｜旅行备忘录</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;color:#111827;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(255,248,235,.015),rgba(255,248,235,.015)),url('./bg.jpg') center/cover no-repeat}

    .wrap{max-width:860px;margin:0 auto;padding:22px 14px 28px}
    header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:28px;color:#7c4a37;text-shadow:0 2px 10px rgba(255,255,255,.55)}
    .sub{margin:6px 0 0;font-size:13px;font-weight:700;color:rgba(17,24,39,.75)}

    .btn{border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.70);backdrop-filter:blur(8px);border-radius:999px;padding:10px 12px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 12px 22px rgba(0,0,0,.10);color:#111827}
    .btn:active{transform:scale(.98)}
    .btn:active,.tab:active,.cloud-btn:active,.mini-btn:active{transform:scale(.98)}

    .tabs{display:flex;gap:10px;margin:10px 0 14px;align-items:center;flex-wrap:wrap}
    .tab{padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.82);background:rgba(255,255,255,.62);backdrop-filter:blur(8px);font-weight:900;cursor:pointer}
    .tab.active{background:linear-gradient(135deg, rgba(255,255,255,.98), rgba(237,233,254,.92));border-color:rgba(124,58,237,.35);box-shadow:0 14px 26px rgba(124,58,237,.22);color:#5b21b6}

    .tagline{margin-top:6px;font-size:12px;color:rgba(107,114,128,.92);font-weight:800}
    .cloud-meta{margin-top:4px;font-size:12px;color:rgba(107,114,128,.92);font-weight:800}
    .cloud-meta b{color:#111827}
    .cloud-btn{padding:10px 14px;border-radius:999px;border:1px solid #fbcfe8;background:linear-gradient(135deg,#fdf2f8,#eff6ff);color:#7c3aed;font-weight:900;cursor:pointer;box-shadow:0 6px 14px rgba(124,58,237,.12)}
    .cloud-btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(124,58,237,.18)}
    .cloud-btn.is-loading{opacity:.85;filter:saturate(1.1);position:relative}
    .cloud-btn.is-loading::after{content:"";display:inline-block;width:12px;height:12px;margin-left:8px;border:2px solid rgba(124,58,237,.25);border-top-color:rgba(124,58,237,.95);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px}
    .cloud-btn.is-ok{border-color:#86efac;color:#166534;background:linear-gradient(135deg,#f0fdf4,#ecfeff)}
    .cloud-btn.is-err{border-color:#fecaca;color:#991b1b;background:linear-gradient(135deg,#fef2f2,#fff7ed)}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* iOS fallback: visual tap flash */
    .tap-flash{animation:tapFlash .26s ease-out}
    @keyframes tapFlash{
      0%{box-shadow:0 0 0 rgba(124,58,237,0);filter:brightness(1)}
      40%{box-shadow:0 0 0 6px rgba(124,58,237,.18);filter:brightness(1.08)}
      100%{box-shadow:0 0 0 rgba(124,58,237,0);filter:brightness(1)}
    }

    .panel{background:rgba(255,255,255,.30);border:1px solid rgba(255,255,255,.52);border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,.12);backdrop-filter:blur(5px);overflow:hidden}
    .section{padding:14px 14px 8px;border-bottom:1px solid rgba(0,0,0,.06)}
    .section:last-child{border-bottom:none}
    .section-title{margin:0 0 8px;font-size:15px;color:rgba(17,24,39,.85);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .muted{font-size:12px;color:rgba(107,114,128,.9);font-weight:700}

    .items{display:flex;flex-direction:column;gap:8px;padding-bottom:8px;width:100%}

    /* 重做：固定两列（左文字，右勾选） */
    .item{
      width:100%;
      display:grid;
      grid-template-columns:minmax(0,1fr) 28px;
      align-items:center;
      gap:10px;
      padding:10px 8px 10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.32);
      border:1px solid rgba(255,255,255,.85);
      transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;
    }
    .item.moved{animation:popDown .34s cubic-bezier(.2,.9,.2,1)}
    @keyframes popDown{0%{transform:translateY(0) scale(1)}45%{transform:translateY(6px) scale(.985);box-shadow:0 10px 18px rgba(0,0,0,.10)}100%{transform:translateY(0) scale(1)}}

    .item label{min-width:0;display:block;font-weight:900;color:rgba(17,24,39,.92);user-select:none}
    .item.checked label{color:rgba(107,114,128,.85);text-decoration:line-through}
    .item.checked{background:rgba(255,255,255,.52);border-color:rgba(255,255,255,.65)}

    .item input[type="checkbox"]{width:22px;height:22px;accent-color:#ff7aa2;margin:0;justify-self:end}

    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .row select,.row input[type="text"]{flex:1;min-width:140px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.80);font-size:14px;outline:none}
    .settings-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.85);margin:8px 0}
    .mini-btn{border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.78);border-radius:12px;padding:8px 10px;font-weight:900;cursor:pointer}
    .mini-btn.danger{background:rgba(255,235,238,.9);border-color:rgba(255,205,210,.95)}

    @media (max-width:420px){h1{font-size:24px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>去玩咯</h1>
        <p class="sub">旅行物品清单｜左边文字，右边勾选</p>
      </div>
      <button class="btn" id="resetBtn" type="button">🧼 一键重置</button>
    </header>

    <div class="tabs">
      <button class="tab active" id="tabList" type="button">清单</button>
      <button class="tab" id="tabSettings" type="button">设置</button>
      <button class="cloud-btn" id="cloudUploadBtn" type="button">☁️ 云上传</button>
      <button class="cloud-btn" id="cloudDownloadBtn" type="button">☁️ 云下载</button>
    </div>

    <div class="wrap" style="padding-top:0;padding-bottom:0">
      <div id="travelCloudMeta" class="cloud-meta">上次上传：<b>--</b> ｜ 上次下载：<b>--</b></div>
    </div>

    <div id="viewList" class="panel"></div>

    <div id="viewSettings" class="panel" style="display:none;padding:14px;">
      <div style="font-weight:900;color:rgba(17,24,39,.88)">管理小项（大类锁定）</div>
      <div class="muted" style="margin-top:6px">可新增/删除小项；勾选状态不影响这里。</div>

      <div class="row">
        <select id="catSel"></select>
        <input id="newItem" type="text" placeholder="新增物品（例如：充电线）" />
        <button class="btn" id="addBtn" type="button">➕ 添加</button>
      </div>

      <div id="settingsList" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== UX helpers (tap feedback) =====
    function haptic(ms=18){
      try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(_){ }
    }
    function flashTap(el){
      if(!el) return;
      el.classList.remove('tap-flash');
      // reflow
      void el.offsetWidth;
      el.classList.add('tap-flash');
      setTimeout(()=>el.classList.remove('tap-flash'), 260);
    }
    function withBtnState(btn, states){
      // states: {loading, success, error}
      const origText = btn.dataset.origText || btn.textContent;
      btn.dataset.origText = origText;
      const set = (kind) => {
        const conf = states[kind] || {};
        if(conf.text) btn.textContent = conf.text;
        btn.disabled = !!conf.disabled;
        btn.classList.toggle('is-loading', kind==='loading');
        btn.classList.toggle('is-ok', kind==='success');
        btn.classList.toggle('is-err', kind==='error');
      };
      const reset = () => {
        btn.textContent = origText;
        btn.disabled = false;
        btn.classList.remove('is-loading','is-ok','is-err');
      };
      return { set, reset };
    }

    const KEY_ITEMS='lw5_travel_items_v1';
    const KEY_CHECKED='lw5_travel_checked_v1';

    const CATEGORIES=['证件类','电子设备类','洗漱护肤类','药品类','海岛装备类','舒适用品类','其他类'];
    const defaultData={
      '证件类':['身份证','护照','取卡针','项链'],
      '电子设备类':['手机','充电宝','充电线','充电头','iPad','游戏机','耳机','Pocket'],
      '洗漱护肤类':['防晒霜','牙刷','牙膏','洗面奶','擦脸油','面霜','润唇膏','洗脸巾','护发素','湿厕纸'],
      '药品类':['糠酸莫米松','碘伏棉签','创可贴','感冒药','止痛药','止泻药','晕船药','驱蚊喷雾','蚊香'],
      '海岛装备类':['泳裤','沙滩拖鞋','泳镜','浮潜面罩','速干毛巾','墨镜','草帽','潜水刀'],
      '舒适用品类':['颈枕','耳塞','眼罩','TT'],
      '其他类':[]
    };

    const clone=(x)=>JSON.parse(JSON.stringify(x));
    const loadItems=()=>{try{const v=JSON.parse(localStorage.getItem(KEY_ITEMS));if(v&&typeof v==='object')return v;}catch(_){}return clone(defaultData)};
    const saveItems=(v)=>localStorage.setItem(KEY_ITEMS,JSON.stringify(v));
    const loadChecked=()=>{try{const v=JSON.parse(localStorage.getItem(KEY_CHECKED));if(v&&typeof v==='object')return v;}catch(_){}return {}};
    const saveChecked=(v)=>localStorage.setItem(KEY_CHECKED,JSON.stringify(v));

    let itemsByCat=loadItems();
    let checkedByCat=loadChecked();
    let travelSbClient=null;

    const DEFAULT_CLOUD_CONFIG={
      url:'https://lrtglriomkxjxmxpzivj.supabase.co',
      key:'sb_publishable_0Lah9n6HEd-KYcJS1D5F1Q_jJsoQBEJ',
      householdId:'lw5-home'
    };

    function getCloudConfig(){
      let saved={};
      try{saved=JSON.parse(localStorage.getItem('cloudConfig')||'{}')||{}}catch(_){saved={}}
      const merged={...DEFAULT_CLOUD_CONFIG,...saved};
      const changed=merged.url!==saved.url||merged.key!==saved.key||merged.householdId!==saved.householdId;
      if(changed) localStorage.setItem('cloudConfig',JSON.stringify(merged));
      return merged;
    }

    function fmtTs(ts){
      if(!ts) return '--';
      const d=new Date(ts);
      if(Number.isNaN(d.getTime())) return '--';
      return d.toLocaleString('zh-CN',{hour12:false});
    }
    function renderTravelCloudMeta(){
      const el=document.getElementById('travelCloudMeta');
      if(!el) return;
      let meta={};
      try{ meta=JSON.parse(localStorage.getItem('travelCloudMeta')||'{}')||{} }catch(_){ meta={} }
      el.innerHTML = `上次上传：<b>${fmtTs(meta.lastUploadAt)}</b> ｜ 上次下载：<b>${fmtTs(meta.lastDownloadAt)}</b>`;
    }
    function cloudReady(){
      const c=getCloudConfig();
      return !!(c.url&&c.key&&c.householdId);
    }
    function getTravelSb(){
      if(!cloudReady()) return null;
      const c=getCloudConfig();
      if(!travelSbClient||travelSbClient.__url!==c.url||travelSbClient.__key!==c.key){
        travelSbClient=window.supabase.createClient(c.url,c.key);
        travelSbClient.__url=c.url;travelSbClient.__key=c.key;
      }
      return travelSbClient;
    }

    function normalizeCloudUrl(url=''){
      return String(url||'').trim().replace(/\/+$/,'');
    }

    async function checkSupabaseReachable(){
      const c=getCloudConfig();
      const base=normalizeCloudUrl(c.url);
      if(!base) throw new Error('云配置里的 URL 为空');
      try{
        const res=await fetch(base+'/rest/v1/', { method:'GET', mode:'cors' });
        if(!res.ok && res.status!==401) throw new Error('Supabase 连通性检查失败（HTTP '+res.status+'）');
        return true;
      }catch(_){
        return true;
      }
    }

    function buildTravelRowsPayload(){
      const rows=travelRowsFromLocal();
      const dedup=new Map();
      rows.forEach(r=>{
        const key=[r.household_id,r.category,r.item_name].join('||');
        dedup.set(key,r);
      });
      return Array.from(dedup.values());
    }

    async function replaceTravelRows(sb, rows, householdId){
      const del=await sb.from('travel_items').delete().eq('household_id', householdId);
      if(del.error) throw del.error;
      if(!rows.length) return;
      const ins=await sb.from('travel_items').insert(rows);
      if(ins.error) throw ins.error;
    }

    function describeTravelUploadError(e){
      const msg=String(e?.message||e?.error_description||e?.details||e||'未知错误');
      if(/Failed to fetch|Load failed|NetworkError|fetch/i.test(msg)) return '浏览器到云端直连校验失败，请继续看后续真实上传结果';
      if(/row-level security|permission denied|not allowed|42501/i.test(msg)) return '云表权限没放开（RLS/Policy）';
      if(/travel_items/i.test(msg) && /does not exist|not found|42P01/i.test(msg)) return '云端缺少 travel_items 表';
      if(/updated_at|item_name|category|household_id|checked/i.test(msg) && /column|schema|42703/i.test(msg)) return 'travel_items 表字段和页面代码不一致';
      if(/constraint|conflict|unique|duplicate/i.test(msg)) return '云表唯一约束/冲突设置不匹配';
      return msg;
    }

    const SUPABASE_RESUME_URL='https://supabase.com/dashboard/project/lrtglriomkxjxmxpzivj';
    function showCloudFailure(msg){
      const tip = `${msg}\n\n如果是 Supabase 项目 paused：\n打开链接 → 点 Resume 即可恢复：\n${SUPABASE_RESUME_URL}`;
      if(confirm(tip + "\n\n点【确定】复制链接，点【取消】不复制")){
        try{ navigator.clipboard && navigator.clipboard.writeText(SUPABASE_RESUME_URL); }catch(_){ }
      }
    }

    function travelRowsFromLocal(){
      const c=getCloudConfig();
      const hid=c.householdId;
      const rows=[];
      for(const cat of CATEGORIES){
        ensure(cat);
        for(const name of itemsByCat[cat]){
          rows.push({
            household_id:hid,
            category:cat,
            item_name:name,
            checked:!!(checkedByCat[cat]&&checkedByCat[cat][name]),
            updated_at:new Date().toISOString()
          });
        }
      }
      return rows;
    }

    function applyRowsToLocal(rows){
      const nextItems={};
      const nextChecked={};
      CATEGORIES.forEach(c=>{nextItems[c]=[];nextChecked[c]={};});
      for(const r of rows){
        const cat=CATEGORIES.includes(r.category)?r.category:'其他类';
        if(!nextItems[cat].includes(r.item_name)) nextItems[cat].push(r.item_name);
        nextChecked[cat][r.item_name]=!!r.checked;
      }
      itemsByCat=nextItems;
      checkedByCat=nextChecked;
      saveItems(itemsByCat);
      saveChecked(checkedByCat);
    }

    async function cloudUploadTravel(){
      if(!cloudReady()){
        alert('请先在仓储页完成云配置（URL/Key/householdId）');
        return;
      }
      const sb=getTravelSb();
      const c=getCloudConfig();
      const st=withBtnState(document.getElementById('cloudUploadBtn'),{
        loading:{text:'☁️ 上传中…',disabled:true},
        success:{text:'✅ 已上传',disabled:true},
        error:{text:'❌ 上传失败',disabled:true},
      });
      haptic(20);
      flashTap(document.getElementById('cloudUploadBtn'));
      st.set('loading');
      try{
        await checkSupabaseReachable();
        const rows=buildTravelRowsPayload();
        try{
          const {error}=await sb.from('travel_items').upsert(rows,{onConflict:'household_id,category,item_name'});
          if(error) throw error;
        }catch(primaryErr){
          console.warn('travel upsert failed, fallback to replace mode', primaryErr);
          await replaceTravelRows(sb, rows, c.householdId);
        }
        st.set('success');
        haptic(25);
        try{
          localStorage.setItem('travelCloudMeta', JSON.stringify({
            ...(JSON.parse(localStorage.getItem('travelCloudMeta')||'{}')||{}),
            lastUploadAt: new Date().toISOString()
          }));
        }catch(_){ }
        renderTravelCloudMeta();
        setTimeout(()=>st.reset(),900);
        alert('☁️ 旅行清单云上传成功');
      }catch(e){
        console.error('travel cloud upload failed', e);
        st.set('error');
        haptic(40);
        setTimeout(()=>st.reset(),1100);
        showCloudFailure('⚠️ 旅行清单云上传失败：'+describeTravelUploadError(e));
      }
    }

    async function cloudDownloadTravel(){
      if(!cloudReady()){
        alert('请先在仓储页完成云配置（URL/Key/householdId）');
        return;
      }
      const sb=getTravelSb();
      const c=getCloudConfig();
      const st=withBtnState(document.getElementById('cloudDownloadBtn'),{
        loading:{text:'☁️ 下载中…',disabled:true},
        success:{text:'✅ 已下载',disabled:true},
        error:{text:'❌ 下载失败',disabled:true},
      });
      haptic(20);
      flashTap(document.getElementById('cloudDownloadBtn'));
      st.set('loading');
      try{
        const {data,error}=await sb.from('travel_items').select('category,item_name,checked').eq('household_id',c.householdId);
        if(error) throw error;
        applyRowsToLocal(data||[]);
        renderList();
        if(document.getElementById('viewSettings').style.display!=='none') renderSettings();
        st.set('success');
        haptic(25);
        try{
          localStorage.setItem('travelCloudMeta', JSON.stringify({
            ...(JSON.parse(localStorage.getItem('travelCloudMeta')||'{}')||{}),
            lastDownloadAt: new Date().toISOString()
          }));
        }catch(_){ }
        renderTravelCloudMeta();
        setTimeout(()=>st.reset(),900);
        alert('☁️ 旅行清单云下载成功，已刷新');
      }catch(e){
        st.set('error');
        haptic(40);
        setTimeout(()=>st.reset(),1100);
        showCloudFailure('⚠️ 旅行清单云下载失败：'+(e.message||'请检查网络/SQL表'));
      }
    }

    function ensure(cat){ if(!itemsByCat[cat])itemsByCat[cat]=[]; if(!checkedByCat[cat])checkedByCat[cat]={}; }
    function sortCat(cat){
      ensure(cat);
      const arr=itemsByCat[cat], ck=checkedByCat[cat]||{};
      const un=[], ch=[];
      arr.forEach(n=> (ck[n]?ch:un).push(n));
      itemsByCat[cat]=[...un,...ch];
    }

    function renderList(){
      const root=document.getElementById('viewList');
      root.innerHTML='';

      for(const cat of CATEGORIES){
        ensure(cat); sortCat(cat);
        const sec=document.createElement('div'); sec.className='section';

        const title=document.createElement('div'); title.className='section-title';
        const left=document.createElement('div'); left.textContent=cat;
        const right=document.createElement('div'); right.className='muted';
        const total=itemsByCat[cat].length;
        const cnt=Object.values(checkedByCat[cat]||{}).filter(Boolean).length;
        right.textContent=total?`${cnt}/${total} 已准备`:'空';
        title.append(left,right);

        const items=document.createElement('div'); items.className='items';
        itemsByCat[cat].forEach(name=>{
          const row=document.createElement('div');
          const isChecked=!!(checkedByCat[cat]&&checkedByCat[cat][name]);
          row.className='item'+(isChecked?' checked':'');

          const label=document.createElement('label');
          label.textContent=name;

          const cb=document.createElement('input');
          cb.type='checkbox';
          cb.checked=isChecked;
          cb.addEventListener('change',()=>{
            ensure(cat);
            checkedByCat[cat][name]=cb.checked;
            saveChecked(checkedByCat);
            row.classList.add('moved');
            setTimeout(()=>{
              sortCat(cat);
              saveItems(itemsByCat);
              renderList();
            },180);
          });

          row.append(label,cb);
          items.appendChild(row);
        });

        sec.append(title,items);
        root.appendChild(sec);
      }
    }

    function fillCatSel(){
      const sel=document.getElementById('catSel');
      sel.innerHTML=CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
    }

    function renderSettings(){
      const box=document.getElementById('settingsList');
      box.innerHTML='';
      for(const cat of CATEGORIES){
        ensure(cat);
        const h=document.createElement('div');
        h.style.marginTop='12px';h.style.fontWeight='900';h.style.color='rgba(17,24,39,.88)';h.textContent=cat;
        box.appendChild(h);

        if(itemsByCat[cat].length===0){
          const e=document.createElement('div');
          e.className='muted';e.style.margin='6px 0 2px';e.textContent='（暂无小项）';
          box.appendChild(e);
        }

        itemsByCat[cat].forEach(name=>{
          const row=document.createElement('div'); row.className='settings-item';
          const l=document.createElement('div'); l.style.fontWeight='900'; l.textContent=name;
          const del=document.createElement('button'); del.className='mini-btn danger'; del.textContent='🗑 删除';
          del.addEventListener('click',()=>{
            if(!confirm(`删除「${cat} - ${name}」？`)) return;
            itemsByCat[cat]=itemsByCat[cat].filter(x=>x!==name);
            if(checkedByCat[cat]) delete checkedByCat[cat][name];
            saveItems(itemsByCat); saveChecked(checkedByCat);
            renderSettings(); renderList();
          });
          row.append(l,del); box.appendChild(row);
        });
      }
    }

    function switchTab(which){
      const tl=document.getElementById('tabList');
      const ts=document.getElementById('tabSettings');
      const vl=document.getElementById('viewList');
      const vs=document.getElementById('viewSettings');
      if(which==='list'){
        tl.classList.add('active'); ts.classList.remove('active');
        vl.style.display='block'; vs.style.display='none';
      }else{
        ts.classList.add('active'); tl.classList.remove('active');
        vl.style.display='none'; vs.style.display='block';
        fillCatSel(); renderSettings();
      }
    }

    document.getElementById('tabList').addEventListener('click',()=>{ const el=document.getElementById('tabList'); haptic(12); flashTap(el); switchTab('list'); });
    document.getElementById('tabSettings').addEventListener('click',()=>{ const el=document.getElementById('tabSettings'); haptic(12); flashTap(el); switchTab('settings'); });
    document.getElementById('cloudUploadBtn').addEventListener('click',cloudUploadTravel);
    document.getElementById('cloudDownloadBtn').addEventListener('click',cloudDownloadTravel);

    document.getElementById('addBtn').addEventListener('click',()=>{
      const el=document.getElementById('addBtn');
      haptic(15);
      flashTap(el);
      const cat=document.getElementById('catSel').value;
      const name=document.getElementById('newItem').value.trim();
      if(!name) return;
      ensure(cat);
      if(itemsByCat[cat].includes(name)){ alert('这个物品已存在～'); return; }
      itemsByCat[cat].push(name);
      saveItems(itemsByCat);
      document.getElementById('newItem').value='';
      renderSettings(); renderList();
    });

    document.getElementById('resetBtn').addEventListener('click',()=>{
      const el=document.getElementById('resetBtn');
      haptic(20);
      flashTap(el);
      if(!confirm('确定一键重置？（仅清空勾选，不会删除清单项）')) return;
      checkedByCat={}; saveChecked(checkedByCat); renderList();
    });

    renderTravelCloudMeta();
    renderList();
  </script>
</body>
</html>
