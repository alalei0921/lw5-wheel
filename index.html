<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lw&5" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <title>Lw&5之家</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;
      color:#2d2d2d;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,245,250,.10), rgba(255,250,240,.16)),
        url('./home-bg.jpg') center/cover no-repeat;
      z-index:-2;
      transform:scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 35%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,.10), transparent 40%);
      z-index:-1;
    }
    .card{
      width:min(430px,92%);
      border-radius:22px;
      background:rgba(255,255,255,.30);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border:1px solid rgba(255,255,255,.50);
      box-shadow:0 14px 34px rgba(112,76,52,.12);
      padding:16px 14px 12px;
      text-align:center;
      transform: translateY(-78px);
    }
    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      color:#7c4a37;
      text-shadow:0 2px 8px rgba(255,255,255,.55);
    }
    .sub{
      margin:5px 0 12px;
      color:#7b6f68;
      font-size:12px;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .tool-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      text-decoration:none;
      min-height:56px;
      border-radius:16px;
      padding:10px;
      font-size:14.5px;
      line-height:1.18;
      font-weight:700;
      text-align:left;
      border:1px solid rgba(255,255,255,.58);
      box-shadow:0 10px 18px rgba(130,99,76,.10);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:#5b4438;
    }
    .tool-btn span:first-child{min-width:0;overflow-wrap:anywhere}
    .tool-btn.wide{
      grid-column:1/-1;
      min-height:50px;
      padding:10px 12px;
      font-size:15px;
    }
    .tool-btn:active{transform:translateY(1px) scale(.98)}
    .tool-btn:hover{transform:translateY(-2px); box-shadow:0 14px 24px rgba(130,99,76,.2)}
    .wheel{background:linear-gradient(135deg,rgba(255,230,243,.66),rgba(255,244,216,.58))}
    .stock{background:linear-gradient(135deg,rgba(232,247,255,.66),rgba(234,255,234,.58))}
    .emoji{font-size:22px;flex:0 0 auto}
    .foot{margin-top:10px;font-size:12px;color:#7a6a61;font-weight:700;text-shadow:0 1px 6px rgba(255,255,255,.72)}

    /* 工具面板（保持在同一页里，BGM 不断） */
    .tool-overlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 80;
    }
    .tool-overlay.show{ display:block; }
    .tool-overlay .backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
    }
    .tool-panel{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 96vw);
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(0,0,0,.22);
      overflow: hidden;
    }
    .tool-panel.full{
      top: 10px;
      bottom: 10px;
    }
    .tool-panel.sheet{
      bottom: 10px;
      height: min(78vh, 720px);
    }
    .tool-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .tool-title{
      font-weight: 900;
      color:#7c4a37;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .cute-close{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.75);
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      font-weight: 900;
      color:#111827;
      cursor:pointer;
      user-select:none;
    }
    .cute-close:active{ transform: scale(.98); }

    .tool-iframe{
      width: 100%;
      height: calc(100% - 50px);
      border: 0;
      background: #fff;
    }

    .music-btn{
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 60;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:0 14px 28px rgba(112,76,52,.16);
      font-weight:800;
      color:#7c4a37;
      cursor:pointer;
      user-select:none;
    }
    .music-btn:active{ transform: translateY(1px) scale(.98); }
    .sun-press{
      position:fixed;
      left:calc(50vw - 13.2vh);
      top:4.25vh;
      z-index:55;
      width:clamp(54px,7.45vh,86px);
      aspect-ratio:1;
      padding:0;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.30);
      background:
        radial-gradient(circle at 42% 35%, rgba(255,255,255,.32), rgba(255,255,255,.08) 58%, rgba(255,230,133,.10) 100%);
      box-shadow:
        inset 0 1px 16px rgba(255,255,255,.24),
        0 0 26px rgba(255,226,122,.18);
      backdrop-filter:blur(1.5px) saturate(1.18);
      -webkit-backdrop-filter:blur(1.5px) saturate(1.18);
      opacity:.46;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .sun-press:active,
    .sun-press.working{
      opacity:.72;
      transform:scale(.94);
      box-shadow:
        inset 0 2px 20px rgba(255,255,255,.34),
        0 0 34px rgba(255,221,94,.28);
    }
    .sun-press:disabled{cursor:wait}
    .home-toast{
      position:fixed;
      left:50%;
      bottom:max(18px,env(safe-area-inset-bottom));
      z-index:95;
      width:min(410px,calc(100% - 30px));
      padding:12px 14px;
      border-radius:16px;
      background:rgba(45,36,31,.88);
      color:#fff;
      box-shadow:0 16px 34px rgba(56,39,31,.22);
      font-size:14px;
      font-weight:850;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transform:translateX(-50%) translateY(14px);
      transition:opacity .18s ease, transform .18s ease;
    }
    .home-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .nebula-overlay{
      --nebula-level:0;
      --nebula-energy:0;
      position:fixed;
      inset:0;
      z-index:140;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,240,160,calc(.015 + var(--nebula-energy) * .30)), transparent 31%),
        radial-gradient(circle at 42% 58%, rgba(68,211,255,calc(.035 + var(--nebula-energy) * .17)), transparent 42%),
        radial-gradient(circle at 62% 38%, rgba(189,113,255,calc(.025 + var(--nebula-energy) * .13)), transparent 46%),
        rgba(1,3,11,.97);
      opacity:0;
      pointer-events:none;
      transition:opacity .32s ease;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }
    .nebula-overlay::before{
      content:"";
      position:absolute;
      inset:-18%;
      z-index:0;
      background:
        conic-gradient(from 0deg at 50% 50%, rgba(255,226,132,.08), rgba(66,210,255,.13), rgba(189,113,255,.11), rgba(255,150,99,.10), rgba(255,226,132,.08));
      filter:blur(22px) brightness(calc(.48 + var(--nebula-energy) * 1.22)) saturate(calc(.65 + var(--nebula-energy) * .75));
      opacity:calc(.16 + var(--nebula-energy) * .66);
      animation:nebulaDrift 18s linear infinite;
    }
    .nebula-overlay::after{
      content:"";
      position:absolute;
      inset:-12%;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 47%, rgba(255,255,235,calc(.02 + var(--nebula-energy) * .34)) 0, rgba(255,204,103,calc(.01 + var(--nebula-energy) * .20)) 16%, transparent 42%),
        radial-gradient(circle at 50% 47%, transparent 19%, rgba(102,223,255,calc(.01 + var(--nebula-energy) * .15)) 37%, transparent 62%);
      mix-blend-mode:screen;
      opacity:calc(.15 + var(--nebula-energy) * .85);
    }
    .nebula-overlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .nebula-overlay.done{
      --nebula-energy:1;
    }
    .nebula-overlay.interacting .nebula-core{
      animation-duration:.78s;
    }
    .nebula-overlay.interacting .nebula-ring{
      filter:brightness(calc(.70 + var(--nebula-energy) * 1.05)) saturate(1.3);
    }
    .nebula-overlay.interacting .nebula-fallback{
      filter:saturate(calc(.72 + var(--nebula-energy) * 1.02)) brightness(calc(.34 + var(--nebula-energy) * 1.46));
    }
    .nebula-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      filter:brightness(calc(.40 + var(--nebula-energy) * .78)) saturate(calc(.62 + var(--nebula-energy) * .72)) contrast(calc(.96 + var(--nebula-energy) * .10));
      transition:filter .08s linear;
    }
    .nebula-stage{
      position:relative;
      z-index:0;
      width:min(64vw,300px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      pointer-events:none;
    }
    .nebula-radiance{
      position:absolute;
      inset:-34%;
      border-radius:50%;
      background:repeating-conic-gradient(from 0deg, rgba(255,244,183,.30) 0 1deg, transparent 2deg 11deg, rgba(103,224,255,.20) 12deg 13deg, transparent 14deg 25deg);
      filter:blur(5px);
      mix-blend-mode:screen;
      opacity:calc(.015 + var(--nebula-energy) * .32);
      animation:nebulaRadiance 26s linear infinite;
    }
    .nebula-fallback{
      width:78%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      inset:11%;
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,.96), rgba(126,236,255,.60) 18%, rgba(73,100,255,.34) 39%, rgba(255,190,94,.28) 62%, rgba(255,255,255,.03) 73%),
        conic-gradient(from 90deg, rgba(71,207,255,.45), rgba(255,214,112,.50), rgba(177,107,255,.46), rgba(255,151,104,.34), rgba(71,207,255,.45));
      opacity:calc(.24 + var(--nebula-energy) * .76);
      filter:saturate(calc(.52 + var(--nebula-energy) * 1.12)) brightness(calc(.30 + var(--nebula-energy) * 1.52));
      box-shadow:0 0 calc(18px + var(--nebula-energy) * 82px) rgba(113,218,255,calc(.12 + var(--nebula-energy) * .52)), 0 0 calc(32px + var(--nebula-energy) * 132px) rgba(246,193,86,calc(.04 + var(--nebula-energy) * .38)), inset 0 0 36px rgba(255,255,255,calc(.05 + var(--nebula-energy) * .28));
      animation:nebulaPulse 2.8s ease-in-out infinite;
    }
    .nebula-core{
      width:26%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      background:
        radial-gradient(circle at 35% 32%, #fff, #fff4ad 34%, rgba(255,168,74,.72) 58%, rgba(88,206,255,.18) 78%, transparent 82%);
      opacity:calc(.12 + var(--nebula-energy) * .88);
      filter:brightness(calc(.34 + var(--nebula-energy) * 1.58)) saturate(calc(.55 + var(--nebula-energy) * .85));
      box-shadow:0 0 calc(8px + var(--nebula-energy) * 54px) rgba(255,245,168,calc(.12 + var(--nebula-energy) * .82)), 0 0 calc(22px + var(--nebula-energy) * 128px) rgba(255,190,89,calc(.02 + var(--nebula-energy) * .52));
      animation:nebulaCore 1.8s ease-in-out infinite;
    }
    .nebula-ring{
      position:absolute;
      width:92%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(182,238,255,.34);
      box-shadow:0 0 28px rgba(91,219,255,.18);
      opacity:calc(.10 + var(--nebula-energy) * .82);
      filter:brightness(calc(.55 + var(--nebula-energy) * 1.05));
      transform:rotateX(66deg) rotateZ(0deg);
      animation:nebulaOrbit 5.4s linear infinite;
    }
    .nebula-ring.two{
      width:72%;
      border-color:rgba(255,221,132,.30);
      animation-duration:4.2s;
      animation-direction:reverse;
      transform:rotateX(58deg) rotateZ(42deg);
    }
    .nebula-ring.three{
      width:112%;
      border-color:rgba(198,144,255,.26);
      animation-duration:7.2s;
      transform:rotateX(74deg) rotateZ(-36deg);
    }
    .nebula-burst{
      position:absolute;
      width:48%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(255,247,188,.0);
      opacity:0;
      transform:scale(.78);
      box-shadow:0 0 0 rgba(255,245,178,0);
    }
    .nebula-burst.ignite{
      animation:nebulaIgnite .82s cubic-bezier(.12,.64,.24,1) both;
    }
    .nebula-burst.extinguish{
      animation:nebulaExtinguish .72s ease-out both;
    }
    .nebula-back{
      position:absolute;
      left:max(18px,env(safe-area-inset-left));
      top:max(18px,env(safe-area-inset-top));
      z-index:3;
      min-height:44px;
      padding:0 16px;
      border:1px solid rgba(255,255,255,.24);
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 16px 36px rgba(0,0,0,.24);
      font-size:15px;
      font-weight:900;
      touch-action:manipulation;
    }
    .nebula-status-wrap{
      position:absolute;
      left:50%;
      bottom:max(34px,env(safe-area-inset-bottom));
      z-index:2;
      transform:translateX(-50%);
      width:min(390px,calc(100% - 34px));
      display:grid;
      gap:8px;
    }
    .nebula-status,
    .nebula-hint{
      padding:12px 16px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      color:rgba(255,255,255,.92);
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      text-align:center;
      font-size:14px;
      font-weight:850;
      box-shadow:0 16px 36px rgba(0,0,0,.22);
    }
    .nebula-hint{
      padding:10px 14px;
      font-size:12px;
      font-weight:750;
      color:rgba(255,255,255,.78);
      background:rgba(3,6,18,.18);
    }
    @keyframes nebulaDrift{
      to{transform:rotate(360deg)}
    }
    @keyframes nebulaRadiance{
      to{transform:rotate(-360deg)}
    }
    @keyframes nebulaPulse{
      0%,100%{transform:scale(.99) rotate(0deg)}
      50%{transform:scale(1.015) rotate(10deg)}
    }
    @keyframes nebulaCore{
      0%,100%{transform:scale(.97)}
      50%{transform:scale(1.035)}
    }
    @keyframes nebulaOrbit{
      to{rotate:360deg}
    }
    @keyframes nebulaIgnite{
      0%{opacity:1;transform:scale(.46);border-color:rgba(255,255,232,.98);box-shadow:0 0 32px rgba(255,246,178,.92),inset 0 0 30px rgba(255,255,255,.76)}
      100%{opacity:0;transform:scale(3.05);border-color:rgba(123,226,255,.04);box-shadow:0 0 104px rgba(255,206,108,.10),inset 0 0 8px rgba(255,255,255,0)}
    }
    @keyframes nebulaExtinguish{
      0%{opacity:.70;transform:scale(2.35);border-color:rgba(121,216,255,.64);box-shadow:0 0 78px rgba(103,194,255,.34)}
      100%{opacity:0;transform:scale(.48);border-color:rgba(106,157,255,0);box-shadow:0 0 8px rgba(74,125,255,0)}
    }

    @media (max-width:420px){
      h1{font-size:28px}
      .tool-btn{font-size:14.5px;padding:10px}
      .tool-btn.wide{font-size:15px;padding:10px 12px}
    }
  </style>
</head>
<body>
  <button class="sun-press" id="sunPress" type="button" aria-label="按下太阳，旋转星云控制灯光"></button>
  <button class="music-btn" id="musicBtn" aria-label="背景音乐">🎵 音乐：开</button>
  <button class="music-btn" id="updateBtn" aria-label="一键更新" style="right: max(12px, env(safe-area-inset-right)); top: calc(max(12px, env(safe-area-inset-top)) + 52px);">🧁 一键更新</button>
  <div class="home-toast" id="homeToast"></div>
  <div class="nebula-overlay" id="nebulaOverlay" aria-hidden="true">
    <canvas class="nebula-canvas" id="nebulaCanvas"></canvas>
    <button class="nebula-back" id="nebulaBack" type="button">返回主页</button>
    <div class="nebula-stage" aria-hidden="true">
      <div class="nebula-radiance"></div>
      <div class="nebula-fallback"></div>
      <div class="nebula-core"></div>
      <div class="nebula-ring"></div>
      <div class="nebula-ring two"></div>
      <div class="nebula-ring three"></div>
      <div class="nebula-burst"></div>
    </div>
    <div class="nebula-status-wrap">
      <div class="nebula-status" id="nebulaStatus">向右旋转点亮灯光</div>
      <div class="nebula-hint" id="nebulaHint">向左旋转会按相反顺序熄灭；未进入本地控制时只播放动画</div>
    </div>
  </div>
  <audio id="homeBgm" preload="auto" loop playsinline webkit-playsinline>
    <source src="./bgm.m4a" type="audio/mp4">
    <source src="./bgm.mp3" type="audio/mpeg">
  </audio>

  <main class="card">
    <h1>Lw&5之家</h1>
    <p class="sub">你们的小工具主站，慢慢长成一个可爱工具箱 ✨</p>

    <section class="grid">
      <button class="tool-btn wheel" type="button" data-tool="wheel" aria-label="打开美食转盘">
        <span>美食转盘</span><span class="emoji">🍜🎡</span>
      </button>
      <button class="tool-btn stock" type="button" data-tool="stock" aria-label="打开仓储管理">
        <span>仓储管理</span><span class="emoji">📦🏠</span>
      </button>
      <button class="tool-btn" type="button" data-tool="travel" aria-label="打开旅行备忘录" style="background:linear-gradient(135deg,rgba(253,242,255,.66),rgba(224,242,254,.58))">
        <span>去玩咯</span><span class="emoji">🏝️🧳</span>
      </button>
      <button class="tool-btn" type="button" data-tool="conflict" aria-label="打开分歧终端机" style="background:linear-gradient(135deg,rgba(255,228,232,.66),rgba(255,240,228,.58))">
        <span>分歧终端机</span><span class="emoji">💕🗣️</span>
      </button>
      <a class="tool-btn wide" href="./smart-home/hyperion.html" aria-label="打开高天之光 许珀里翁" style="background:linear-gradient(135deg,rgba(255,247,204,.62),rgba(220,252,231,.52))">
        <span>高天之光 许珀里翁</span><span class="emoji">💡✨</span>
      </a>
      <a class="tool-btn wide" href="./smart-home/aurora.html" aria-label="打开黎明女神 欧若拉" style="background:linear-gradient(135deg,rgba(255,241,214,.62),rgba(223,247,255,.52))">
        <span>黎明女神 欧若拉</span><span class="emoji">🌅🪟</span>
      </a>
      <a class="tool-btn wide" href="./smart-home/chione.html" aria-label="打开雪之宁芙 喀俄涅" style="background:linear-gradient(135deg,rgba(232,246,255,.62),rgba(210,232,252,.52))">
        <span>雪之宁芙 喀俄涅</span><span class="emoji">❄️🌬️</span>
      </a>
    </section>

    <div class="foot">后续新工具会继续加在这里</div>
  </main>

  <div class="tool-overlay" id="toolOverlay" aria-hidden="true">
    <div class="backdrop" id="toolBackdrop"></div>
    <div class="tool-panel" id="toolPanel" role="dialog" aria-modal="true">
      <div class="tool-topbar">
        <div class="tool-title" id="toolTitle">小工具</div>
        <button class="cute-close" id="toolClose" type="button">🐾 返回主页</button>
      </div>
      <iframe class="tool-iframe" id="toolFrame" title="Lw&5 小工具" loading="eager"></iframe>
    </div>
  </div>

  <script>
    // Register PWA service worker
    (function(){
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {

      textureCanvas.height = 64;
      const textureContext = textureCanvas.getContext('2d');
      const glow = textureContext.createRadialGradient(32, 32, 0, 32, 32, 32);
      glow.addColorStop(0, 'rgba(255,255,255,1)');
      glow.addColorStop(.22, 'rgba(255,255,255,.96)');
      glow.addColorStop(.56, 'rgba(255,255,255,.34)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      textureContext.fillStyle = glow;
      textureContext.fillRect(0, 0, 64, 64);
      particleTexture = new THREE.CanvasTexture(textureCanvas);
      return particleTexture;
    }

    function makeCloud(count, brightColor, dimColor, size, inner, outer) {
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(makePositions(count, inner, outer), 3));
      const material = new THREE.PointsMaterial({
        color:dimColor,
        size,
        map:getParticleTexture(),
        transparent: true,
        opacity: .08,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
      });
      const cloud = new THREE.Points(geometry, material);
      cloud.userData = {
        baseSize:size,
        brightColor:new THREE.Color(brightColor),
        dimColor:new THREE.Color(dimColor),
      };
      cloudMeshes.push(cloud);
      return cloud;
    }

    function makeEnergyTrails(count = 360) {
      const positions = new Float32Array(count * 6);
      const starts = new Float32Array(count * 3);
      const tangents = new Float32Array(count * 3);
      for (let i = 0; i < count; i += 1) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        const radius = .46 + Math.pow(Math.random(), .56) * 1.22;
        const x = Math.sin(phi) * Math.cos(theta) * radius;
        const y = Math.cos(phi) * radius;
        const z = Math.sin(phi) * Math.sin(theta) * radius;
        const tangentLength = Math.max(.001, Math.hypot(x, z));
        starts.set([x, y, z], i * 3);
        tangents.set([-z / tangentLength, (Math.random() - .5) * .16, x / tangentLength], i * 3);
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.LineBasicMaterial({
        color:0x183251,
        transparent:true,
        opacity:.02,
        blending:THREE.AdditiveBlending,
        depthWrite:false,
      });
      const trails = new THREE.LineSegments(geometry, material);
      trails.userData = { starts, tangents };
      trails.frustumCulled = false;
      return trails;
    }

    function updateEnergyTrails(energy) {
      if (!trailMesh) return;
      const attribute = trailMesh.geometry.getAttribute('position');
      const positions = attribute.array;
      const { starts, tangents } = trailMesh.userData;
      const direction = spinBoost < -.025 ? -1 : 1;
      const trailLength = .012 + energy * .105 + Math.abs(spinBoost) * .085 + flashEnergy * .055;
      for (let i = 0; i < starts.length / 3; i += 1) {
        const source = i * 3;
        const target = i * 6;
        positions[target] = starts[source];
        positions[target + 1] = starts[source + 1];
        positions[target + 2] = starts[source + 2];
        positions[target + 3] = starts[source] - tangents[source] * trailLength * direction;
        positions[target + 4] = starts[source + 1] - tangents[source + 1] * trailLength * direction;
        positions[target + 5] = starts[source + 2] - tangents[source + 2] * trailLength * direction;
      }
      attribute.needsUpdate = true;
      trailMesh.material.opacity = .012 + energy * .38 + Math.abs(spinBoost) * .10 + flashEnergy * .16;
      trailMesh.material.color.copy(trailDimColor).lerp(trailBrightColor, energy);
    }

    function getNebulaPixelRatio() {
      const cap = (window.innerWidth || 0) > 720 ? 1.35 : 1.75;
      return Math.min(window.devicePixelRatio || 1, cap);
    }

    function initNebula() {
      if (renderer || fallbackMode || !canvas) return;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
      } catch (error) {
        initFallbackNebula();
        return;
      }
      renderer.setPixelRatio(getNebulaPixelRatio());
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = .48;
      if ('outputColorSpace' in renderer && THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(48, 1, .1, 100);
      camera.position.z = 7.15;
      group = new THREE.Group();
      group.add(makeCloud(2100, 0xc9f7ff, 0x0b172d, .066, .32, 1.36));
      group.add(makeCloud(1260, 0xffe19a, 0x21170d, .084, .62, 1.58));
      group.add(makeCloud(960, 0xdab7ff, 0x17112b, .058, .16, 1.04));
      group.add(makeCloud(420, 0xffa47e, 0x28100e, .052, 1.08, 1.78));
      trailMesh = makeEnergyTrails();
      group.add(trailMesh);
      haloMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.72, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xffdc86, transparent: true, opacity: .16, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      coreMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.18, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xfff1a8, transparent: true, opacity: .92, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      group.add(haloMesh);
      group.add(coreMesh);
      [
        { radius:1.18, color:0x9de7ff, opacity:.34, rx:.53, rz:.08 },
        { radius:1.43, color:0xffdd8a, opacity:.28, rx:.62, rz:.72 },
        { radius:.92, color:0xd2a8ff, opacity:.30, rx:.46, rz:-.52 },
      ].forEach((item) => {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(item.radius, .006, 8, 180),
          new THREE.MeshBasicMaterial({ color:item.color, transparent:true, opacity:item.opacity, blending:THREE.AdditiveBlending, depthWrite:false })
        );
        ring.rotation.x = Math.PI * item.rx;
        ring.rotation.z = item.rz;
        ring.userData.baseOpacity = item.opacity;
        orbitRings.push(ring);
        group.add(ring);
      });
      scene.add(group);
      resizeNebula();
      window.addEventListener('resize', resizeNebula);
      bindNebulaInteraction();
    }

    function resizeNebula() {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      if (fallbackMode && ctx2d) {
        const dpr = getNebulaPixelRatio();
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
        return;
      }
      if (!renderer || !camera) return;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function animateNebula(time = 0) {
      if (!overlay?.classList.contains('show')) {
        frame = 0;
        return;
      }
      frame = requestAnimationFrame(animateNebula);
      updateInteractionPhysics();
      const targetProgress = Math.max(0, Math.min(1, Number(window.__nebulaProgress || 0)));
      renderedProgress += (targetProgress - renderedProgress) * (pointerActive ? .24 : .14);
      if (Math.abs(targetProgress - renderedProgress) < .0005) renderedProgress = targetProgress;
      const energy = Math.pow(renderedProgress, .78);
      flashEnergy *= .885;
      if (fallbackMode) {
        drawFallbackNebula(time);
        return;
      }
      group.rotation.y += (.0048 + energy * .0042) + spinBoost * .036;
      group.rotation.x = Math.sin(time * .00042) * .24 + pointerY * .34;
      group.rotation.z = Math.cos(time * .00032) * .10 - pointerX * .34 + spinBoost * .52;
      group.position.x = pointerX * .18;
      group.position.y = -pointerY * .14;
      cloudMeshes.forEach((cloud) => {
        cloud.material.color.copy(cloud.userData.dimColor).lerp(cloud.userData.brightColor, energy);
        cloud.material.opacity = clamp(.025 + energy * .74 + flashEnergy * .11 + dragBoost * .025, .02, .92);
        cloud.material.size = cloud.userData.baseSize * (.72 + energy * .34 + Math.min(.10, dragBoost * .05));
      });
      orbitRings.forEach((ring) => {
        ring.material.opacity = ring.userData.baseOpacity * (.13 + energy * 1.34) + flashEnergy * .08;
      });
      updateEnergyTrails(energy);
      if (coreMesh) {
        const coreScale = .93 + energy * .10 + Math.sin(time * .0046) * .025 + flashEnergy * .055;
        coreMesh.scale.setScalar(coreScale);
        coreMesh.material.color.copy(coreDimColor).lerp(coreBrightColor, energy);
        coreMesh.material.opacity = clamp(.08 + energy * .90 + flashEnergy * .16, .06, 1);
      }
      if (haloMesh) {
        const haloScale = .95 + energy * .08 + Math.sin(time * .0026) * .018 + flashEnergy * .075;
        haloMesh.scale.setScalar(haloScale);
        haloMesh.material.color.copy(haloDimColor).lerp(haloBrightColor, energy);
        haloMesh.material.opacity = clamp(.018 + energy * .37 + flashEnergy * .20, .01, .62);
      }
      const scale = .98 + energy * .028 + Math.sin(time * .0022) * .009 + dragBoost * .012;
      group.scale.setScalar(scale);
      renderer.toneMappingExposure = .42 + energy * .78 + flashEnergy * .28;
      renderer.render(scene, camera);
    }

    function startNebula() {
      initNebula();
      if (!frame) animateNebula();
    }

    window.addEventListener('lw5-nebula-start', startNebula);
    window.addEventListener('lw5-nebula-finish', startNebula);
    window.addEventListener('lw5-nebula-ignite', (event) => {
      flashDirection = event.detail?.direction < 0 ? -1 : 1;
      flashEnergy = 1;
    });
    if (overlay?.classList.contains('show')) startNebula();
  </script>
</body>
</html>
