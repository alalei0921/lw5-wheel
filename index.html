<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lw&5" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <title>Lw&5之家</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;
      color:#2d2d2d;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,245,250,.10), rgba(255,250,240,.16)),
        url('./home-bg.jpg') center/cover no-repeat;
      z-index:-2;
      transform:scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 35%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,.10), transparent 40%);
      z-index:-1;
    }
    .card{
      width:min(430px,92%);
      border-radius:22px;
      background:rgba(255,255,255,.30);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border:1px solid rgba(255,255,255,.50);
      box-shadow:0 14px 34px rgba(112,76,52,.12);
      padding:16px 14px 12px;
      text-align:center;
      transform: translateY(-78px);
      transition:transform .72s cubic-bezier(.22,.78,.22,1),filter .72s ease,opacity .52s ease;
    }
    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      color:#7c4a37;
      text-shadow:0 2px 8px rgba(255,255,255,.55);
    }
    .sub{
      margin:5px 0 12px;
      color:#7b6f68;
      font-size:12px;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .tool-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      text-decoration:none;
      min-height:56px;
      border-radius:16px;
      padding:10px;
      font-size:14.5px;
      line-height:1.18;
      font-weight:700;
      text-align:left;
      border:1px solid rgba(255,255,255,.58);
      box-shadow:0 10px 18px rgba(130,99,76,.10);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:#5b4438;
    }
    .tool-btn span:first-child{min-width:0;overflow-wrap:anywhere}
    .tool-btn.wide{
      grid-column:1/-1;
      min-height:50px;
      padding:10px 12px;
      font-size:15px;
    }
    .tool-btn:active{transform:translateY(1px) scale(.98)}
    .tool-btn:hover{transform:translateY(-2px); box-shadow:0 14px 24px rgba(130,99,76,.2)}
    .wheel{background:linear-gradient(135deg,rgba(255,230,243,.66),rgba(255,244,216,.58))}
    .stock{background:linear-gradient(135deg,rgba(232,247,255,.66),rgba(234,255,234,.58))}
    .emoji{font-size:22px;flex:0 0 auto}
    .foot{margin-top:10px;font-size:12px;color:#7a6a61;font-weight:700;text-shadow:0 1px 6px rgba(255,255,255,.72)}

    /* 工具面板（保持在同一页里，BGM 不断） */
    .tool-overlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 80;
    }
    .tool-overlay.show{ display:block; }
    .tool-overlay .backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
    }
    .tool-panel{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 96vw);
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(0,0,0,.22);
      overflow: hidden;
    }
    .tool-panel.full{
      top: 10px;
      bottom: 10px;
    }
    .tool-panel.sheet{
      bottom: 10px;
      height: min(78vh, 720px);
    }
    .tool-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .tool-title{
      font-weight: 900;
      color:#7c4a37;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .cute-close{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.75);
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      font-weight: 900;
      color:#111827;
      cursor:pointer;
      user-select:none;
    }
    .cute-close:active{ transform: scale(.98); }

    .tool-iframe{
      width: 100%;
      height: calc(100% - 50px);
      border: 0;
      background: #fff;
    }

    .music-btn{
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 60;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:0 14px 28px rgba(112,76,52,.16);
      font-weight:800;
      color:#7c4a37;
      cursor:pointer;
      user-select:none;
      transition:opacity .42s ease,transform .48s cubic-bezier(.2,.8,.2,1);
    }
    .music-btn:active{ transform: translateY(1px) scale(.98); }
    .sun-press{
      position:fixed;
      left:calc(50vw - 13.2vh);
      top:4.25vh;
      z-index:145;
      width:clamp(54px,7.45vh,86px);
      aspect-ratio:1;
      padding:0;
      overflow:hidden;
      isolation:isolate;
      border-radius:50%;
      border:1px solid rgba(210,246,255,.72);
      background:
        radial-gradient(circle at 38% 32%,rgba(255,255,255,.94) 0 3%,rgba(181,243,255,.66) 8%,transparent 22%),
        radial-gradient(circle at 50% 48%,rgba(104,220,255,.86) 0,rgba(44,104,178,.88) 34%,rgba(93,56,151,.86) 64%,rgba(7,16,48,.88) 100%);
      box-shadow:
        inset 0 0 15px rgba(205,244,255,.48),
        0 0 12px rgba(103,218,255,.52),
        0 0 25px rgba(255,220,120,.32);
      opacity:.94;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      transition:opacity .18s ease,transform .24s ease,box-shadow .24s ease;
    }
    .sun-press::before{
      content:"";
      position:absolute;
      inset:-12%;
      z-index:1;
      border-radius:50%;
      background:
        radial-gradient(circle at 18% 27%,rgba(255,255,255,.98) 0 1.2px,transparent 2.1px),
        radial-gradient(circle at 32% 74%,rgba(255,222,128,.96) 0 1.1px,transparent 2px),
        radial-gradient(circle at 47% 16%,rgba(169,241,255,.96) 0 1.3px,transparent 2.2px),
        radial-gradient(circle at 61% 81%,rgba(220,181,255,.94) 0 1.2px,transparent 2.1px),
        radial-gradient(circle at 75% 33%,rgba(255,236,167,.98) 0 1.4px,transparent 2.4px),
        radial-gradient(circle at 83% 61%,rgba(153,232,255,.98) 0 1.1px,transparent 2px),
        radial-gradient(circle at 44% 54%,rgba(255,255,255,.92) 0 .9px,transparent 1.8px),
        radial-gradient(circle at 21% 57%,rgba(192,170,255,.88) 0 1px,transparent 1.9px);
      filter:drop-shadow(0 0 3px rgba(168,235,255,.92));
      animation:sunNebulaParticles 3.6s linear infinite;
    }
    .sun-press::after{
      content:"";
      position:absolute;
      left:8%;
      top:33%;
      z-index:2;
      width:84%;
      height:34%;
      border:1px solid rgba(226,249,255,.72);
      border-radius:50%;
      box-shadow:0 0 6px rgba(112,224,255,.68),inset 0 0 4px rgba(255,226,138,.42);
      transform:rotate(-18deg);
      animation:sunNebulaOrbit 4.8s ease-in-out infinite alternate;
    }
    .sun-press:active,
    .sun-press.working{
      opacity:0;
      transform:scale(.88);
      pointer-events:none;
      box-shadow:
        inset 0 2px 20px rgba(255,255,255,.34),
        0 0 34px rgba(255,221,94,.28);
    }
    .sun-press:disabled{cursor:wait}
    body.nebula-active .card{
      transform:translateY(-78px) scale(.975);
      filter:brightness(.58) saturate(.72) blur(1.2px);
      opacity:.74;
    }
    body.nebula-active .music-btn{
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px) scale(.96);
    }
    .home-toast{
      position:fixed;
      left:50%;
      bottom:max(18px,env(safe-area-inset-bottom));
      z-index:95;
      width:min(410px,calc(100% - 30px));
      padding:12px 14px;
      border-radius:16px;
      background:rgba(45,36,31,.88);
      color:#fff;
      box-shadow:0 16px 34px rgba(56,39,31,.22);
      font-size:14px;
      font-weight:850;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transform:translateX(-50%) translateY(14px);
      transition:opacity .18s ease, transform .18s ease;
    }
    .home-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .nebula-overlay{
      --nebula-level:0;
      --nebula-energy:0;
      --sun-x:50vw;
      --sun-y:8vh;
      --sun-radius:34px;
      --sun-size:68px;
      --nebula-mini-x:0px;
      --nebula-mini-y:0px;
      --nebula-mini-scale:.24;
      position:fixed;
      inset:0;
      z-index:140;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 47%, rgba(39,78,148,calc(.14 + var(--nebula-energy) * .04)), transparent 39%),
        radial-gradient(circle at 50% 46%, rgba(255,240,160,calc(.015 + var(--nebula-energy) * .30)), transparent 31%),
        radial-gradient(circle at 42% 58%, rgba(68,211,255,calc(.055 + var(--nebula-energy) * .15)), transparent 42%),
        radial-gradient(circle at 62% 38%, rgba(189,113,255,calc(.050 + var(--nebula-energy) * .105)), transparent 46%),
        rgba(1,3,11,.985);
      opacity:1;
      pointer-events:none;
      clip-path:circle(var(--sun-radius) at var(--sun-x) var(--sun-y));
      -webkit-clip-path:circle(var(--sun-radius) at var(--sun-x) var(--sun-y));
      transition:clip-path 1.04s cubic-bezier(.22,.62,.24,1),-webkit-clip-path 1.04s cubic-bezier(.22,.62,.24,1);
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      will-change:clip-path;
    }
    .nebula-overlay::before{
      content:"";
      position:absolute;
      inset:-18%;
      z-index:0;
      background:
        conic-gradient(from 0deg at 50% 50%, rgba(255,226,132,.08), rgba(66,210,255,.13), rgba(189,113,255,.11), rgba(255,150,99,.10), rgba(255,226,132,.08));
      filter:blur(22px) brightness(calc(.62 + var(--nebula-energy) * 1.08)) saturate(calc(.75 + var(--nebula-energy) * .65));
      opacity:calc(.28 + var(--nebula-energy) * .54);
      animation:nebulaDrift 18s linear infinite;
    }
    .nebula-overlay::after{
      content:"";
      position:absolute;
      inset:-12%;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 47%, rgba(255,255,235,calc(.02 + var(--nebula-energy) * .34)) 0, rgba(255,204,103,calc(.01 + var(--nebula-energy) * .20)) 16%, transparent 42%),
        radial-gradient(circle at 50% 47%, transparent 19%, rgba(102,223,255,calc(.01 + var(--nebula-energy) * .15)) 37%, transparent 62%);
      mix-blend-mode:screen;
      opacity:calc(.15 + var(--nebula-energy) * .85);
    }
    .nebula-overlay.expanding,
    .nebula-overlay.expanded{
      clip-path:circle(150vmax at var(--sun-x) var(--sun-y));
      -webkit-clip-path:circle(150vmax at var(--sun-x) var(--sun-y));
      pointer-events:auto;
    }
    .nebula-overlay.priming{
      pointer-events:auto;
    }
    .nebula-overlay.collapsing{
      clip-path:circle(var(--sun-radius) at var(--sun-x) var(--sun-y));
      -webkit-clip-path:circle(var(--sun-radius) at var(--sun-x) var(--sun-y));
      pointer-events:auto;
      transition-duration:.76s;
      transition-timing-function:cubic-bezier(.50,0,.28,1);
    }
    .nebula-overlay.done{
      --nebula-energy:1;
    }
    .nebula-overlay.interacting .nebula-core{
      animation-duration:.78s;
    }
    .nebula-overlay.interacting .nebula-ring{
      filter:brightness(calc(.85 + var(--nebula-energy) * .90)) saturate(1.3);
    }
    .nebula-overlay.interacting .nebula-fallback{
      filter:saturate(calc(.92 + var(--nebula-energy) * .82)) brightness(calc(.52 + var(--nebula-energy) * 1.28));
    }
    .nebula-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      filter:brightness(calc(.78 + var(--nebula-energy) * .40)) saturate(calc(.92 + var(--nebula-energy) * .42)) contrast(calc(.99 + var(--nebula-energy) * .07));
      transition:filter .08s linear;
    }
    .nebula-stage{
      position:relative;
      z-index:0;
      width:min(64vw,300px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      pointer-events:none;
      transform:translate(var(--nebula-mini-x),var(--nebula-mini-y)) scale(var(--nebula-mini-scale));
      transform-origin:center;
      transition:transform 1.04s cubic-bezier(.22,.62,.24,1),filter .54s ease;
      will-change:transform;
    }
    .nebula-overlay.expanding .nebula-stage,
    .nebula-overlay.expanded .nebula-stage{
      transform:translate(0,0) scale(1);
    }
    .nebula-overlay.collapsing .nebula-stage{
      transform:translate(var(--nebula-mini-x),var(--nebula-mini-y)) scale(var(--nebula-mini-scale));
      transition-duration:.76s;
      transition-timing-function:cubic-bezier(.50,0,.28,1);
    }
    .nebula-radiance{
      position:absolute;
      inset:-34%;
      border-radius:50%;
      background:repeating-conic-gradient(from 0deg, rgba(255,244,183,.30) 0 1deg, transparent 2deg 11deg, rgba(103,224,255,.20) 12deg 13deg, transparent 14deg 25deg);
      filter:blur(5px);
      mix-blend-mode:screen;
      opacity:calc(.035 + var(--nebula-energy) * .30);
      animation:nebulaRadiance 26s linear infinite;
    }
    .nebula-fallback{
      width:78%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      inset:11%;
      overflow:hidden;
      background:
        radial-gradient(circle at 36% 32%, rgba(145,198,255,.60), rgba(49,91,150,.62) 18%, rgba(31,41,94,.72) 42%, rgba(35,19,70,.60) 62%, rgba(3,8,22,.06) 73%),
        conic-gradient(from 90deg, rgba(36,116,169,.58), rgba(50,61,127,.62), rgba(91,50,139,.60), rgba(37,74,132,.55), rgba(36,116,169,.58));
      opacity:calc(.60 + var(--nebula-energy) * .40);
      filter:saturate(calc(.96 + var(--nebula-energy) * .68)) brightness(calc(.60 + var(--nebula-energy) * 1.22));
      box-shadow:0 0 calc(18px + var(--nebula-energy) * 82px) rgba(113,218,255,calc(.22 + var(--nebula-energy) * .42)), 0 0 calc(32px + var(--nebula-energy) * 132px) rgba(246,193,86,calc(.02 + var(--nebula-energy) * .40)), inset 0 0 36px rgba(190,226,255,calc(.10 + var(--nebula-energy) * .23));
      animation:nebulaPulse 2.8s ease-in-out infinite;
    }
    .nebula-fallback::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,.96), rgba(126,236,255,.60) 18%, rgba(73,100,255,.34) 39%, rgba(255,190,94,.28) 62%, rgba(255,255,255,.03) 73%),
        conic-gradient(from 90deg, rgba(71,207,255,.45), rgba(255,214,112,.50), rgba(177,107,255,.46), rgba(255,151,104,.34), rgba(71,207,255,.45));
      mix-blend-mode:screen;
      opacity:var(--nebula-energy);
    }
    .nebula-core{
      width:26%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      background:
        radial-gradient(circle at 35% 32%, rgba(154,210,255,.88), rgba(58,98,166,.76) 34%, rgba(35,38,106,.70) 60%, rgba(20,25,73,.18) 78%, transparent 82%);
      opacity:calc(.62 + var(--nebula-energy) * .38);
      filter:brightness(calc(.78 + var(--nebula-energy) * 1.14)) saturate(calc(1 + var(--nebula-energy) * .40));
      box-shadow:0 0 calc(8px + var(--nebula-energy) * 54px) rgba(114,190,255,calc(.20 + var(--nebula-energy) * .34)), 0 0 calc(22px + var(--nebula-energy) * 128px) rgba(255,190,89,calc(var(--nebula-energy) * .54));
      animation:nebulaCore 1.8s ease-in-out infinite;
    }
    .nebula-core::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:radial-gradient(circle at 35% 32%, #fff, #fff4ad 34%, rgba(255,168,74,.72) 58%, rgba(88,206,255,.18) 78%, transparent 82%);
      mix-blend-mode:screen;
      opacity:var(--nebula-energy);
    }
    .nebula-ring{
      position:absolute;
      width:92%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(182,238,255,.34);
      box-shadow:0 0 28px rgba(91,219,255,.18);
      opacity:calc(.30 + var(--nebula-energy) * .62);
      filter:brightness(calc(.95 + var(--nebula-energy) * .65));
      transform:rotateX(66deg) rotateZ(0deg);
      animation:nebulaOrbit 5.4s linear infinite;
    }
    .nebula-ring.two{
      width:72%;
      border-color:rgba(255,221,132,.30);
      animation-duration:4.2s;
      animation-direction:reverse;
      transform:rotateX(58deg) rotateZ(42deg);
    }
    .nebula-ring.three{
      width:112%;
      border-color:rgba(198,144,255,.26);
      animation-duration:7.2s;
      transform:rotateX(74deg) rotateZ(-36deg);
    }
    .nebula-burst{
      position:absolute;
      width:48%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(255,247,188,.0);
      opacity:0;
      transform:scale(.78);
      box-shadow:0 0 0 rgba(255,245,178,0);
    }
    .nebula-burst.ignite{
      animation:nebulaIgnite .82s cubic-bezier(.12,.64,.24,1) both;
    }
    .nebula-burst.extinguish{
      animation:nebulaExtinguish .72s ease-out both;
    }
    .nebula-portal{
      position:absolute;
      left:var(--sun-x);
      top:var(--sun-y);
      z-index:2;
      width:var(--sun-size);
      aspect-ratio:1;
      border-radius:50%;
      opacity:0;
      pointer-events:none;
      transform:translate(-50%,-50%);
      mix-blend-mode:screen;
    }
    .nebula-portal::before,
    .nebula-portal::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      opacity:0;
    }
    .nebula-portal::before{
      border:1.5px solid rgba(207,244,255,.92);
      box-shadow:0 0 18px rgba(111,222,255,.78),0 0 42px rgba(172,120,255,.48),inset 0 0 18px rgba(255,255,255,.50);
    }
    .nebula-portal::after{
      background:radial-gradient(circle,rgba(255,255,255,.98) 0,rgba(143,226,255,.72) 18%,rgba(174,119,255,.30) 42%,transparent 70%);
      filter:blur(2px);
    }
    .nebula-portal-rays{
      position:absolute;
      inset:-390%;
      border-radius:50%;
      opacity:0;
      background:repeating-conic-gradient(from 0deg,rgba(151,232,255,.28) 0 .7deg,transparent 1.2deg 8deg,rgba(255,221,139,.19) 8.8deg 9.4deg,transparent 10deg 19deg);
      filter:blur(.6px);
      transform:scale(.12) rotate(0deg);
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-portal{
      opacity:.58;
      animation:nebulaMiniAnchor 3.2s ease-in-out infinite;
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-portal::before{
      opacity:.52;
      animation:nebulaMiniRing 3.2s ease-in-out infinite;
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-portal::after{
      opacity:.10;
      animation:nebulaMiniGlow 3.2s ease-in-out infinite;
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-canvas{
      filter:brightness(.92) saturate(1.38) contrast(1.16);
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-fallback{
      filter:saturate(1.42) brightness(.84);
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-fallback::after{
      opacity:calc(.12 + var(--nebula-energy) * .24);
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-core{
      opacity:.78;
      filter:brightness(.88) saturate(1.38);
    }
    .nebula-overlay:not(.priming):not(.expanding):not(.expanded):not(.collapsing) .nebula-core::after{
      opacity:calc(.08 + var(--nebula-energy) * .20);
    }
    .nebula-overlay.priming .nebula-portal{
      animation:nebulaPrimeAnchor .24s ease-out both;
    }
    .nebula-overlay.priming .nebula-portal::before{
      animation:nebulaPrimeRing .24s ease-out both;
    }
    .nebula-overlay.priming .nebula-portal::after{
      animation:nebulaPrimeGlow .24s ease-out both;
    }
    .nebula-overlay.expanding .nebula-portal{
      animation:nebulaPortalAnchor 1.04s ease-out both;
    }
    .nebula-overlay.expanding .nebula-portal::before{
      animation:nebulaPortalRing 1.04s cubic-bezier(.12,.64,.20,1) both;
    }
    .nebula-overlay.expanding .nebula-portal::after{
      animation:nebulaPortalFlash .72s ease-out both;
    }
    .nebula-overlay.expanding .nebula-portal-rays{
      animation:nebulaPortalRays 1.04s cubic-bezier(.16,.74,.22,1) both;
    }
    .nebula-overlay.collapsing .nebula-portal{
      animation:nebulaPortalCollapse .76s ease-in both;
    }
    .nebula-overlay.collapsing .nebula-portal::before{
      animation:nebulaPortalRingClose .76s cubic-bezier(.50,0,.28,1) both;
    }
    .nebula-back{
      position:absolute;
      left:max(18px,env(safe-area-inset-left));
      top:max(18px,env(safe-area-inset-top));
      z-index:3;
      min-height:44px;
      padding:0 16px;
      border:1px solid rgba(255,255,255,.24);
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 16px 36px rgba(0,0,0,.24);
      font-size:15px;
      font-weight:900;
      touch-action:manipulation;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transform:translateY(-12px) scale(.94);
      transition:opacity .30s ease,transform .36s cubic-bezier(.2,.8,.2,1),visibility 0s linear .36s;
    }
    .nebula-status-wrap{
      position:absolute;
      left:50%;
      bottom:max(34px,env(safe-area-inset-bottom));
      z-index:2;
      transform:translateX(-50%);
      width:min(390px,calc(100% - 34px));
      display:grid;
      gap:8px;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transform:translateX(-50%) translateY(18px);
      transition:opacity .34s ease,transform .40s cubic-bezier(.2,.8,.2,1),visibility 0s linear .40s;
    }
    .nebula-overlay.control-ready .nebula-back{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      transform:translateY(0) scale(1);
      transition-delay:.05s;
    }
    .nebula-overlay.control-ready .nebula-status-wrap{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      transform:translateX(-50%) translateY(0);
      transition-delay:.10s;
    }
    .nebula-status,
    .nebula-hint{
      padding:12px 16px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      color:rgba(255,255,255,.92);
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      text-align:center;
      font-size:14px;
      font-weight:850;
      box-shadow:0 16px 36px rgba(0,0,0,.22);
    }
    .nebula-hint{
      padding:10px 14px;
      font-size:12px;
      font-weight:750;
      color:rgba(255,255,255,.78);
      background:rgba(3,6,18,.18);
    }
    @keyframes nebulaDrift{
      to{transform:rotate(360deg)}
    }
    @keyframes sunNebulaParticles{
      0%{transform:rotate(0deg) scale(.96)}
      50%{transform:rotate(180deg) scale(1.04)}
      100%{transform:rotate(360deg) scale(.96)}
    }
    @keyframes sunNebulaOrbit{
      0%{transform:rotate(-24deg) scaleX(.92);opacity:.58}
      100%{transform:rotate(18deg) scaleX(1.08);opacity:.96}
    }
    @keyframes nebulaRadiance{
      to{transform:rotate(-360deg)}
    }
    @keyframes nebulaPulse{
      0%,100%{transform:scale(.99) rotate(0deg)}
      50%{transform:scale(1.015) rotate(10deg)}
    }
    @keyframes nebulaCore{
      0%,100%{transform:scale(.97)}
      50%{transform:scale(1.035)}
    }
    @keyframes nebulaOrbit{
      to{rotate:360deg}
    }
    @keyframes nebulaIgnite{
      0%{opacity:1;transform:scale(.46);border-color:rgba(255,255,232,.98);box-shadow:0 0 32px rgba(255,246,178,.92),inset 0 0 30px rgba(255,255,255,.76)}
      100%{opacity:0;transform:scale(3.05);border-color:rgba(123,226,255,.04);box-shadow:0 0 104px rgba(255,206,108,.10),inset 0 0 8px rgba(255,255,255,0)}
    }
    @keyframes nebulaExtinguish{
      0%{opacity:.70;transform:scale(2.35);border-color:rgba(121,216,255,.64);box-shadow:0 0 78px rgba(103,194,255,.34)}
      100%{opacity:0;transform:scale(.48);border-color:rgba(106,157,255,0);box-shadow:0 0 8px rgba(74,125,255,0)}
    }
    @keyframes nebulaPortalAnchor{
      0%{opacity:0;filter:brightness(.8)}
      10%{opacity:1;filter:brightness(1.7)}
      62%{opacity:.82;filter:brightness(1.25)}
      100%{opacity:0;filter:brightness(1)}
    }
    @keyframes nebulaMiniAnchor{
      0%,100%{filter:brightness(.88);opacity:.42}
      50%{filter:brightness(1.20);opacity:.68}
    }
    @keyframes nebulaMiniRing{
      0%,100%{opacity:.34;transform:scale(.94)}
      50%{opacity:.72;transform:scale(1.08)}
    }
    @keyframes nebulaMiniGlow{
      0%,100%{opacity:.05;transform:scale(.84)}
      50%{opacity:.16;transform:scale(1.14)}
    }
    @keyframes nebulaPrimeAnchor{
      0%{opacity:.60;filter:brightness(1.18)}
      45%{opacity:1;filter:brightness(1.70)}
      100%{opacity:.34;filter:brightness(.72)}
    }
    @keyframes nebulaPrimeRing{
      0%{opacity:.55;transform:scale(1)}
      55%{opacity:1;transform:scale(1.22)}
      100%{opacity:.20;transform:scale(.74)}
    }
    @keyframes nebulaPrimeGlow{
      0%{opacity:.12;transform:scale(1)}
      55%{opacity:.78;transform:scale(1.26)}
      100%{opacity:.06;transform:scale(.54)}
    }
    @keyframes nebulaPortalRing{
      0%{opacity:0;transform:scale(.62)}
      14%{opacity:1;transform:scale(1.05)}
      100%{opacity:0;transform:scale(17)}
    }
    @keyframes nebulaPortalFlash{
      0%{opacity:0;transform:scale(.42)}
      18%{opacity:1;transform:scale(1.05)}
      58%{opacity:.40;transform:scale(3.2)}
      100%{opacity:0;transform:scale(6.8)}
    }
    @keyframes nebulaPortalRays{
      0%{opacity:0;transform:scale(.10) rotate(0deg)}
      22%{opacity:.62}
      100%{opacity:0;transform:scale(1.35) rotate(42deg)}
    }
    @keyframes nebulaPortalCollapse{
      0%{opacity:0;filter:brightness(1)}
      70%{opacity:.56;filter:brightness(1.18)}
      100%{opacity:0;filter:brightness(.82)}
    }
    @keyframes nebulaPortalRingClose{
      0%{opacity:0;transform:scale(14)}
      70%{opacity:.58}
      100%{opacity:0;transform:scale(.72)}
    }

    @media (max-width:420px){
      h1{font-size:28px}
      .tool-btn{font-size:14.5px;padding:10px}
      .tool-btn.wide{font-size:15px;padding:10px 12px}
    }
  </style>

  <div class="tool-overlay" id="toolOverlay" aria-hidden="true">

  <script>
    // Register PWA service worker
    (function(){
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    })();

    // One-click update: unregister SW + clear caches + hard reload
    (function(){
      const btn = document.getElementById('updateBtn');
      if (!btn) return;
      btn.addEventListener('click', async () => {
        btn.textContent = '🍬 更新中...';
        try{
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          }
        }catch(_){ }
        // cache-busting reload
        const url = new URL(location.href);
        url.searchParams.set('v', String(Date.now()));
        location.href = url.toString();
      });
    })();

    (function(){
      const sunBtn = document.getElementById('sunPress');
      const toast = document.getElementById('homeToast');
      const nebulaOverlay = document.getElementById('nebulaOverlay');
      const nebulaStatus = document.getElementById('nebulaStatus');
      const nebulaHint = document.getElementById('nebulaHint');
      const nebulaBack = document.getElementById('nebulaBack');
      const nebulaBurst = nebulaOverlay?.querySelector('.nebula-burst');
      const LOCAL_ORIGIN = 'http://192.168.1.105:8788';
      const VISUAL_TEST = new URL(location.href).searchParams.get('visual-test') === '1';
      const LIGHT_SEQUENCE = [
        { loop: 9, name: '主卧射灯' },
        { loop: 4, name: '客厅射灯' },
        { loop: 3, name: '客厅吊灯' },
        { loop: 1, name: '玄关灯带' },
        { loop: 2, name: '玄关射灯' },
        { loop: 5, name: '餐厅吊灯' },
        { loop: 6, name: '餐厅射灯' },
        { loop: 8, name: '主卧吊灯' },
        { loop: 7, name: '衣帽间' },
      ];
      const STEP_COUNT = LIGHT_SEQUENCE.length;
      const HOME_VISUAL_STEP = 4;
      const PRIME_DURATION = 240;
      const OPEN_DURATION = 1040;
      const CLOSE_DURATION = 760;
      let toastTimer = null;
      let nebulaStep = 0;
      let nebulaMode = 'mini';
      let transitionToken = 0;
      let localControlFailed = false;
      let commandQueue = Promise.resolve();
      window.__nebulaProgress = 0;
      window.__nebulaEnergy = 0;
      window.__nebulaExpansion = 0;

      function showHomeToast(message){
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
      }

      function clamp(value, min, max){
        return Math.max(min, Math.min(max, value));
      }

      function syncSunGeometry(){
        if (!sunBtn || !nebulaOverlay) return;
        const rect = sunBtn.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const stageSize = Math.min(window.innerWidth * .64, 300);
        const miniScale = clamp(rect.width / Math.max(1, stageSize * 1.12), .15, .34);
        const miniX = centerX - window.innerWidth / 2;
        const miniY = centerY - window.innerHeight / 2;
        nebulaOverlay.style.setProperty('--sun-x', centerX + 'px');
        nebulaOverlay.style.setProperty('--sun-y', centerY + 'px');
        nebulaOverlay.style.setProperty('--sun-radius', (rect.width / 2) + 'px');
        nebulaOverlay.style.setProperty('--sun-size', rect.width + 'px');
        nebulaOverlay.style.setProperty('--nebula-mini-x', miniX + 'px');
        nebulaOverlay.style.setProperty('--nebula-mini-y', miniY + 'px');
        nebulaOverlay.style.setProperty('--nebula-mini-scale', String(miniScale));
        window.__nebulaSunRect = {
          left:rect.left,
          top:rect.top,
          width:rect.width,
          height:rect.height,
          centerX,
          centerY,
        };
      }

      function animateExpansion(target, duration, token){
        const from = Number(window.__nebulaExpansion || 0);
        const opening = target > from;
        const startedAt = performance.now();
        return new Promise((resolve) => {
          const tick = (now) => {
            if (token !== transitionToken) {
              resolve(false);
              return;
            }
            const elapsed = clamp((now - startedAt) / duration, 0, 1);
            const openingPhase = clamp((elapsed - .06) / .94, 0, 1);
            const eased = opening
              ? 1 - Math.pow(1 - openingPhase, 3)
              : (elapsed < .5 ? 4 * elapsed * elapsed * elapsed : 1 - Math.pow(-2 * elapsed + 2, 3) / 2);
            window.__nebulaExpansion = from + (target - from) * eased;
            if (elapsed < 1) {
              requestAnimationFrame(tick);
            } else {
              window.__nebulaExpansion = target;
              resolve(true);
            }
          };
          requestAnimationFrame(tick);
        });
      }

      function animateVisualStep(target, duration, token){
        const from = Number(window.__nebulaProgress || 0) * STEP_COUNT;
        const startedAt = performance.now();
        return new Promise((resolve) => {
          const tick = (now) => {
            if (token !== transitionToken) {
              resolve(false);
              return;
            }
            const elapsed = clamp((now - startedAt) / duration, 0, 1);
            const eased = elapsed * (2 - elapsed);
            setNebulaVisualStep(from + (target - from) * eased);
            if (elapsed < 1) {
              requestAnimationFrame(tick);
            } else {
              setNebulaVisualStep(target);
              resolve(true);
            }
          };
          requestAnimationFrame(tick);
        });
      }

      function setNebulaStep(step, label){
        nebulaStep = Math.max(0, Math.min(STEP_COUNT, step));
        setNebulaVisualStep(nebulaStep);
        nebulaOverlay?.classList.toggle('done', nebulaStep === STEP_COUNT);
        if (label) {
          nebulaStatus.textContent = label;
        } else if (nebulaStep === 0) {
          nebulaStatus.textContent = '向右旋转点亮灯光';
        } else if (nebulaStep === STEP_COUNT) {
          nebulaStatus.textContent = '九盏灯已全部点亮';
        } else {
          nebulaStatus.textContent = '已点亮 ' + nebulaStep + ' / ' + STEP_COUNT + '：' + LIGHT_SEQUENCE[nebulaStep - 1].name;
        }
      }

      function setNebulaVisualStep(step){
        const visualStep = Math.max(0, Math.min(STEP_COUNT, Number(step) || 0));
        const progress = visualStep / STEP_COUNT;
        const energy = Math.pow(progress, .78);
        window.__nebulaProgress = progress;
        window.__nebulaEnergy = energy;
        nebulaOverlay?.style.setProperty('--nebula-level', String(progress));
        nebulaOverlay?.style.setProperty('--nebula-energy', String(energy));
        window.dispatchEvent(new CustomEvent('lw5-nebula-progress', { detail: { step: visualStep, progress, energy } }));
      }

      function pulseNebula(direction){
        if (nebulaBurst) {
          nebulaBurst.classList.remove('ignite', 'extinguish');
          void nebulaBurst.offsetWidth;
          nebulaBurst.classList.add(direction > 0 ? 'ignite' : 'extinguish');
        }
        window.dispatchEvent(new CustomEvent('lw5-nebula-ignite', { detail: { direction, step: nebulaStep } }));
      }

      async function showNebula(){
        if (!nebulaOverlay || nebulaMode !== 'mini') return;
        const token = ++transitionToken;
        nebulaMode = 'priming';
        syncSunGeometry();
        localControlFailed = false;
        commandQueue = Promise.resolve();
        nebulaHint.textContent = '向左旋转会按相反顺序熄灭；未进入本地控制时只播放动画';
        nebulaOverlay.classList.remove('done', 'priming', 'collapsing', 'expanded', 'control-ready');
        nebulaBurst?.classList.remove('ignite', 'extinguish');
        nebulaOverlay.setAttribute('aria-hidden', 'false');
        nebulaStep = 0;
        nebulaStatus.textContent = '向右旋转点亮灯光';
        sunBtn.disabled = true;
        sunBtn.classList.add('working');
        document.body.classList.add('nebula-active');
        void nebulaOverlay.offsetWidth;
        nebulaOverlay.classList.add('priming');
        window.dispatchEvent(new CustomEvent('lw5-nebula-prime-start'));
        const primed = await animateVisualStep(0, PRIME_DURATION, token);
        if (!primed || token !== transitionToken) return;
        nebulaOverlay.classList.remove('priming');
        nebulaMode = 'expanding';
        void nebulaOverlay.offsetWidth;
        nebulaOverlay.classList.add('expanding');
        window.dispatchEvent(new CustomEvent('lw5-nebula-expand-start'));
        const completed = await animateExpansion(1, OPEN_DURATION, token);
        if (!completed || token !== transitionToken) return;
        nebulaOverlay.classList.remove('expanding');
        nebulaOverlay.classList.add('expanded', 'control-ready');
        nebulaMode = 'expanded';
        window.dispatchEvent(new CustomEvent('lw5-nebula-expanded'));
      }

      async function closeNebula(){
        if (!nebulaOverlay || nebulaMode !== 'expanded') return;
        const token = ++transitionToken;
        nebulaMode = 'collapsing';
        nebulaOverlay.classList.remove('expanded', 'control-ready', 'done');
        nebulaOverlay.classList.add('collapsing');
        setNebulaStep(0);
        window.dispatchEvent(new CustomEvent('lw5-nebula-collapse-start'));
        const completed = await animateExpansion(0, CLOSE_DURATION, token);
        if (!completed || token !== transitionToken) return;
        nebulaOverlay.classList.remove('collapsing');
        nebulaOverlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('nebula-active');
        sunBtn.disabled = false;
        sunBtn.classList.remove('working');
        nebulaMode = 'mini';
        syncSunGeometry();
        window.dispatchEvent(new CustomEvent('lw5-nebula-collapse-complete'));
        animateVisualStep(HOME_VISUAL_STEP, 420, token);
      }

      async function sendLightCommand(light, on){
        if (VISUAL_TEST) {
          nebulaHint.textContent = '视觉测试模式：动画运行中，不发送灯光指令';
          return;
        }
        try {
          const response = await fetch(LOCAL_ORIGIN + '/api/sun-lights/' + light.loop + '/' + (on ? 'on' : 'off'), {
            method: 'POST',
            mode: 'cors',
            cache: 'no-store',
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || '本地控制失败');
          if (!localControlFailed) nebulaHint.textContent = '本地控制已连接，继续旋转即可控制灯光';
        } catch (error) {
          localControlFailed = true;
          nebulaHint.textContent = '未进入本地控制：当前只播放动画，连接家里 Wi-Fi 后才会真正控制灯光';
        }
      }

      function moveNebulaStep(direction){
        if (!nebulaOverlay?.classList.contains('control-ready')) return;

    }

    function initNebula() {
      if (renderer || fallbackMode || !canvas) return;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
      } catch (error) {
        initFallbackNebula();
        return;
      }
      renderer.setPixelRatio(getNebulaPixelRatio());
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = .48;
      if ('outputColorSpace' in renderer && THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(48, 1, .1, 100);
      camera.position.z = 7.15;
      group = new THREE.Group();
      group.add(makeCloud(2100, 0xc9f7ff, 0x4a8bb3, .066, .32, 1.36));
      group.add(makeCloud(1260, 0xffe19a, 0x53648e, .084, .62, 1.58));
      group.add(makeCloud(960, 0xdab7ff, 0x6b4f92, .058, .16, 1.04));
      group.add(makeCloud(420, 0xffa47e, 0x594776, .052, 1.08, 1.78));
      trailMesh = makeEnergyTrails();
      group.add(trailMesh);
      haloMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.72, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xffdc86, transparent: true, opacity: .16, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      coreMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.18, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xfff1a8, transparent: true, opacity: .92, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      group.add(haloMesh);
      group.add(coreMesh);
      [
        { radius:1.18, color:0x9de7ff, opacity:.34, rx:.53, rz:.08 },
        { radius:1.43, color:0xffdd8a, opacity:.28, rx:.62, rz:.72 },
        { radius:.92, color:0xd2a8ff, opacity:.30, rx:.46, rz:-.52 },
      ].forEach((item) => {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(item.radius, .006, 8, 180),
          new THREE.MeshBasicMaterial({ color:item.color, transparent:true, opacity:item.opacity, blending:THREE.AdditiveBlending, depthWrite:false })
        );
        ring.rotation.x = Math.PI * item.rx;
        ring.rotation.z = item.rz;
        ring.userData.baseOpacity = item.opacity;
        orbitRings.push(ring);
        group.add(ring);
      });
      scene.add(group);
      resizeNebula();
      window.addEventListener('resize', resizeNebula);
      bindNebulaInteraction();
    }

    function resizeNebula() {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      if (fallbackMode && ctx2d) {
        const dpr = getNebulaPixelRatio();
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
        return;
      }
      if (!renderer || !camera) return;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function animateNebula(time = 0) {
      frame = requestAnimationFrame(animateNebula);
      const expansion = getExpansion();
      const miniIdle = expansion < .01 && !overlay?.classList.contains('expanding') && !overlay?.classList.contains('collapsing');
      if (miniIdle && time - lastRenderTime < 45) return;
      lastRenderTime = time;
      updateInteractionPhysics();
      const targetProgress = Math.max(0, Math.min(1, Number(window.__nebulaProgress || 0)));
      renderedProgress += (targetProgress - renderedProgress) * (pointerActive ? .24 : .14);
      if (Math.abs(targetProgress - renderedProgress) < .0005) renderedProgress = targetProgress;
      const energy = Math.pow(renderedProgress, .78);
      flashEnergy *= .885;
      if (fallbackMode) {
        drawFallbackNebula(time);
        return;
      }
      const miniFactor = 1 - expansion;
      const miniRotationBoost = 1 + miniFactor * 2.10;
      group.rotation.y += (.0048 + energy * .0042) * miniRotationBoost + spinBoost * .036;
      group.rotation.x = Math.sin(time * .00042) * .24 + pointerY * .34 * expansion;
      group.rotation.z = Math.cos(time * .00032) * .10 - pointerX * .34 * expansion + spinBoost * .52;
      const viewportWidth = window.innerWidth || 1;
      const viewportHeight = window.innerHeight || 1;
      const sunRect = getSunRect();
      const worldHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * camera.position.z;
      const worldWidth = worldHeight * camera.aspect;
      const miniX = ((sunRect.centerX / viewportWidth) - .5) * worldWidth;
      const miniY = -((sunRect.centerY / viewportHeight) - .5) * worldHeight;
      group.position.x = miniX * (1 - expansion) + pointerX * .18 * expansion;
      group.position.y = miniY * (1 - expansion) - pointerY * .14 * expansion;
      cloudMeshes.forEach((cloud) => {
        cloud.material.color.copy(cloud.userData.dimColor).lerp(cloud.userData.brightColor, energy);
        cloud.material.opacity = clamp(.18 + energy * .585 + miniFactor * .16 + flashEnergy * .11 + dragBoost * .025, .16, .94);
        cloud.material.size = cloud.userData.baseSize * (.90 + energy * .16 + Math.min(.10, dragBoost * .05)) * (1 + miniFactor * 1.58);
      });
      orbitRings.forEach((ring) => {
        ring.material.opacity = ring.userData.baseOpacity * (.28 + energy * 1.19) + flashEnergy * .08;
      });
      updateEnergyTrails(energy);
      if (coreMesh) {
        const coreScale = .93 + energy * .10 + Math.sin(time * .0046) * .025 + flashEnergy * .055;
        coreMesh.scale.setScalar(coreScale);
        coreMesh.material.color.copy(coreDimColor).lerp(coreBrightColor, energy);
        coreMesh.material.opacity = clamp((.34 + energy * .64 + flashEnergy * .16) * (1 - miniFactor * .52), .24, 1);
      }
      if (haloMesh) {
        const haloScale = .95 + energy * .08 + Math.sin(time * .0026) * .018 + flashEnergy * .075;
        haloMesh.scale.setScalar(haloScale);
        haloMesh.material.color.copy(haloDimColor).lerp(haloBrightColor, energy);
        haloMesh.material.opacity = clamp((.08 + energy * .308 + flashEnergy * .20) * (1 - miniFactor * .34), .05, .62);
      }
      const miniSceneScale = clamp(sunRect.width / Math.max(1, Math.min(viewportWidth, viewportHeight) * .70), .14, .36);
      const sceneExpansionScale = miniSceneScale + (1 - miniSceneScale) * expansion;
      const scale = (.98 + energy * .028 + Math.sin(time * .0022) * .009 + dragBoost * .012) * sceneExpansionScale;
      group.scale.setScalar(scale);
      const miniExposure = .43 + energy * .48 + flashEnergy * .18;
      const fullExposure = .58 + energy * .62 + flashEnergy * .28;
      renderer.toneMappingExposure = miniExposure + (fullExposure - miniExposure) * expansion;
      renderer.render(scene, camera);
    }

    function startNebula() {
      initNebula();
      if (!frame) animateNebula();
    }

    window.addEventListener('lw5-nebula-start', startNebula);
    window.addEventListener('lw5-nebula-finish', startNebula);
    window.addEventListener('lw5-nebula-ignite', (event) => {
      flashDirection = event.detail?.direction < 0 ? -1 : 1;
      flashEnergy = 1;
    });
    window.addEventListener('lw5-nebula-prime-start', () => {
      flashDirection = -1;
      flashEnergy = .82;
      spinBoost = .62;
    });
    window.addEventListener('lw5-nebula-expand-start', () => {
      setRenderQuality(true);
      flashDirection = 1;
      flashEnergy = 1;
      spinBoost = 1.08;
    });
    window.addEventListener('lw5-nebula-collapse-start', () => {
      pointerActive = false;
      dragAccumulator = 0;
      overlay?.classList.remove('interacting');
      flashDirection = -1;
      flashEnergy = .72;
    });
    window.addEventListener('lw5-nebula-collapse-complete', () => {
      pointerX = 0;
      pointerY = 0;
      targetPointerX = 0;
      targetPointerY = 0;
      spinBoost = 0;
      setTimeout(() => {
        if (getExpansion() < .01 && !overlay?.classList.contains('expanding')) {
          setRenderQuality(false);
        }
      }, 360);
    });
    if (overlay) startNebula();
  </script>
</body>
</html>
