<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Lw&5之家</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;
      color:#2d2d2d;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,245,250,.25), rgba(255,250,240,.45)),
        url('./home-bg.jpg') center/cover no-repeat;
      z-index:-2;
      transform:scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.35), transparent 35%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,.25), transparent 40%);
      z-index:-1;
    }
    .card{
      width:min(520px,100%);
      border-radius:28px;
      background:rgba(255,255,255,.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.65);
      box-shadow:0 20px 50px rgba(112,76,52,.18);
      padding:26px 20px 22px;
      text-align:center;
    }
    h1{
      margin:0;
      font-size:34px;
      letter-spacing:.5px;
      color:#7c4a37;
      text-shadow:0 2px 8px rgba(255,255,255,.55);
    }
    .sub{
      margin:8px 0 20px;
      color:#7b6f68;
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }
    .tool-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      text-decoration:none;
      border-radius:20px;
      padding:16px 18px;
      font-size:18px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.7);
      box-shadow:0 12px 20px rgba(130,99,76,.13);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:#5b4438;
    }
    .tool-btn:active{transform:translateY(1px) scale(.98)}
    .tool-btn:hover{transform:translateY(-2px); box-shadow:0 14px 24px rgba(130,99,76,.2)}
    .wheel{background:linear-gradient(135deg,#ffe6f3,#fff4d8)}
    .stock{background:linear-gradient(135deg,#e8f7ff,#eaffea)}
    .emoji{font-size:24px}
    .foot{margin-top:14px;font-size:12px;color:#8a7a71}

    @media (max-width:420px){
      h1{font-size:30px}
      .tool-btn{font-size:17px;padding:14px 16px}
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Lw&5之家</h1>
    <p class="sub">你们的小工具主站，慢慢长成一个可爱工具箱 ✨</p>

    <section class="grid">
      <a class="tool-btn wheel" href="./wheel/" aria-label="打开美食转盘">
        <span>美食转盘</span><span class="emoji">🍜🎡</span>
      </a>
      <a class="tool-btn stock" href="./stock/" aria-label="打开仓储管理">
        <span>仓储管理</span><span class="emoji">📦🏠</span>
      </a>
    </section>

    <div class="foot">后续新工具会继续加在这里</div>
  </main>
</body>
</html>
