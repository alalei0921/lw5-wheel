<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lw&5" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <title>Lw&5之家</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;
      color:#2d2d2d;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,245,250,.10), rgba(255,250,240,.16)),
        url('./home-bg.jpg') center/cover no-repeat;
      z-index:-2;
      transform:scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 35%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,.10), transparent 40%);
      z-index:-1;
    }
    .card{
      width:min(430px,92%);
      border-radius:22px;
      background:rgba(255,255,255,.30);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border:1px solid rgba(255,255,255,.50);
      box-shadow:0 14px 34px rgba(112,76,52,.12);
      padding:16px 14px 12px;
      text-align:center;
      transform: translateY(-78px);
    }
    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      color:#7c4a37;
      text-shadow:0 2px 8px rgba(255,255,255,.55);
    }
    .sub{
      margin:5px 0 12px;
      color:#7b6f68;
      font-size:12px;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .tool-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      text-decoration:none;
      min-height:56px;
      border-radius:16px;
      padding:10px;
      font-size:14.5px;
      line-height:1.18;
      font-weight:700;
      text-align:left;
      border:1px solid rgba(255,255,255,.58);
      box-shadow:0 10px 18px rgba(130,99,76,.10);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:#5b4438;
    }
    .tool-btn span:first-child{min-width:0;overflow-wrap:anywhere}
    .tool-btn.wide{
      grid-column:1/-1;
      min-height:50px;
      padding:10px 12px;
      font-size:15px;
    }
    .tool-btn:active{transform:translateY(1px) scale(.98)}
    .tool-btn:hover{transform:translateY(-2px); box-shadow:0 14px 24px rgba(130,99,76,.2)}
    .wheel{background:linear-gradient(135deg,rgba(255,230,243,.66),rgba(255,244,216,.58))}
    .stock{background:linear-gradient(135deg,rgba(232,247,255,.66),rgba(234,255,234,.58))}
    .emoji{font-size:22px;flex:0 0 auto}
    .foot{margin-top:10px;font-size:12px;color:#7a6a61;font-weight:700;text-shadow:0 1px 6px rgba(255,255,255,.72)}

    /* 工具面板（保持在同一页里，BGM 不断） */
    .tool-overlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 80;
    }
    .tool-overlay.show{ display:block; }
    .tool-overlay .backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
    }
    .tool-panel{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 96vw);
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(0,0,0,.22);
      overflow: hidden;
    }
    .tool-panel.full{
      top: 10px;
      bottom: 10px;
    }
    .tool-panel.sheet{
      bottom: 10px;
      height: min(78vh, 720px);
    }
    .tool-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .tool-title{
      font-weight: 900;
      color:#7c4a37;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .cute-close{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.75);
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      font-weight: 900;
      color:#111827;
      cursor:pointer;
      user-select:none;
    }
    .cute-close:active{ transform: scale(.98); }

    .tool-iframe{
      width: 100%;
      height: calc(100% - 50px);
      border: 0;
      background: #fff;
    }

    .music-btn{
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 60;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:0 14px 28px rgba(112,76,52,.16);
      font-weight:800;
      color:#7c4a37;
      cursor:pointer;
      user-select:none;
    }
    .music-btn:active{ transform: translateY(1px) scale(.98); }
    .sun-press{
      position:fixed;
      left:calc(50vw - 13.2vh);
      top:4.25vh;
      z-index:55;
      width:clamp(54px,7.45vh,86px);
      aspect-ratio:1;
      padding:0;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.30);
      background:
        radial-gradient(circle at 42% 35%, rgba(255,255,255,.32), rgba(255,255,255,.08) 58%, rgba(255,230,133,.10) 100%);
      box-shadow:
        inset 0 1px 16px rgba(255,255,255,.24),
        0 0 26px rgba(255,226,122,.18);
      backdrop-filter:blur(1.5px) saturate(1.18);
      -webkit-backdrop-filter:blur(1.5px) saturate(1.18);
      opacity:.46;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .sun-press:active,
    .sun-press.working{
      opacity:.72;
      transform:scale(.94);
      box-shadow:
        inset 0 2px 20px rgba(255,255,255,.34),
        0 0 34px rgba(255,221,94,.28);
    }
    .sun-press:disabled{cursor:wait}
    .home-toast{
      position:fixed;
      left:50%;
      bottom:max(18px,env(safe-area-inset-bottom));
      z-index:95;
      width:min(410px,calc(100% - 30px));
      padding:12px 14px;
      border-radius:16px;
      background:rgba(45,36,31,.88);
      color:#fff;
      box-shadow:0 16px 34px rgba(56,39,31,.22);
      font-size:14px;
      font-weight:850;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transform:translateX(-50%) translateY(14px);
      transition:opacity .18s ease, transform .18s ease;
    }
    .home-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .nebula-overlay{
      position:fixed;
      inset:0;
      z-index:140;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,229,128,.24), transparent 25%),
        radial-gradient(circle at 42% 58%, rgba(68,211,255,.22), transparent 34%),
        radial-gradient(circle at 62% 38%, rgba(189,113,255,.18), transparent 38%),
        rgba(3,6,18,.91);
      opacity:0;
      pointer-events:none;
      transition:opacity .32s ease;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
    }
    .nebula-overlay::before{
      content:"";
      position:absolute;
      inset:-18%;
      z-index:0;
      background:
        conic-gradient(from 0deg at 50% 50%, rgba(255,226,132,.08), rgba(66,210,255,.13), rgba(189,113,255,.11), rgba(255,150,99,.10), rgba(255,226,132,.08));
      filter:blur(18px);
      animation:nebulaDrift 18s linear infinite;
    }
    .nebula-overlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .nebula-overlay.done{
      background:
        radial-gradient(circle at 50% 42%, rgba(255,242,169,.36), transparent 31%),
        radial-gradient(circle at 50% 52%, rgba(77,221,255,.22), transparent 44%),
        radial-gradient(circle at 60% 40%, rgba(255,141,103,.20), transparent 48%),
        rgba(3,6,18,.90);
    }
    .nebula-overlay.interacting .nebula-core{
      animation-duration:.78s;
      box-shadow:0 0 34px rgba(255,249,190,.96), 0 0 104px rgba(255,190,89,.58);
    }
    .nebula-overlay.interacting .nebula-ring{
      filter:brightness(1.45) saturate(1.2);
    }
    .nebula-overlay.interacting .nebula-fallback{
      filter:saturate(1.35) brightness(1.08);
    }
    .nebula-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
    }
    .nebula-stage{
      position:relative;
      z-index:0;
      width:min(64vw,300px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      pointer-events:none;
    }
    .nebula-fallback{
      width:78%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      inset:11%;
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,.96), rgba(126,236,255,.60) 18%, rgba(73,100,255,.34) 39%, rgba(255,190,94,.28) 62%, rgba(255,255,255,.03) 73%),
        conic-gradient(from 90deg, rgba(71,207,255,.45), rgba(255,214,112,.50), rgba(177,107,255,.46), rgba(255,151,104,.34), rgba(71,207,255,.45));
      filter:blur(.1px);
      box-shadow:0 0 46px rgba(113,218,255,.48), 0 0 104px rgba(246,193,86,.26), inset 0 0 36px rgba(255,255,255,.22);
      animation:nebulaPulse 2.8s ease-in-out infinite;
    }
    .nebula-core{
      width:26%;
      aspect-ratio:1;
      border-radius:50%;
      position:absolute;
      background:
        radial-gradient(circle at 35% 32%, #fff, #fff4ad 34%, rgba(255,168,74,.72) 58%, rgba(88,206,255,.18) 78%, transparent 82%);
      box-shadow:0 0 24px rgba(255,245,168,.88), 0 0 78px rgba(255,190,89,.42);
      animation:nebulaCore 1.8s ease-in-out infinite;
    }
    .nebula-ring{
      position:absolute;
      width:92%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(182,238,255,.34);
      box-shadow:0 0 28px rgba(91,219,255,.18);
      transform:rotateX(66deg) rotateZ(0deg);
      animation:nebulaOrbit 5.4s linear infinite;
    }
    .nebula-ring.two{
      width:72%;
      border-color:rgba(255,221,132,.30);
      animation-duration:4.2s;
      animation-direction:reverse;
      transform:rotateX(58deg) rotateZ(42deg);
    }
    .nebula-ring.three{
      width:112%;
      border-color:rgba(198,144,255,.26);
      animation-duration:7.2s;
      transform:rotateX(74deg) rotateZ(-36deg);
    }
    .nebula-burst{
      position:absolute;
      width:48%;
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid rgba(255,247,188,.0);
      opacity:0;
      transform:scale(.78);
      box-shadow:0 0 0 rgba(255,245,178,0);
    }
    .nebula-overlay.done .nebula-burst{
      animation:nebulaBurst 1.3s ease-out both;
    }
    .nebula-back{
      position:absolute;
      left:max(18px,env(safe-area-inset-left));
      top:max(18px,env(safe-area-inset-top));
      z-index:3;
      min-height:44px;
      padding:0 16px;
      border:1px solid rgba(255,255,255,.24);
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 16px 36px rgba(0,0,0,.24);
      font-size:15px;
      font-weight:900;
      touch-action:manipulation;
    }
    .nebula-status{
      position:absolute;
      left:50%;
      bottom:max(34px,env(safe-area-inset-bottom));
      z-index:2;
      transform:translateX(-50%);
      width:min(380px,calc(100% - 34px));
      padding:12px 16px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      color:rgba(255,255,255,.92);
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      text-align:center;
      font-size:14px;
      font-weight:850;
      box-shadow:0 16px 36px rgba(0,0,0,.22);
    }
    @keyframes nebulaDrift{
      to{transform:rotate(360deg)}
    }
    @keyframes nebulaPulse{
      0%,100%{transform:scale(.96) rotate(0deg)}
      50%{transform:scale(1.06) rotate(14deg)}
    }
    @keyframes nebulaCore{
      0%,100%{transform:scale(.92);filter:saturate(1)}
      50%{transform:scale(1.12);filter:saturate(1.4)}
    }
    @keyframes nebulaOrbit{
      to{rotate:360deg}
    }
    @keyframes nebulaBurst{
      0%{opacity:.92;transform:scale(.70);border-color:rgba(255,249,198,.88);box-shadow:0 0 24px rgba(255,236,144,.62)}
      100%{opacity:0;transform:scale(2.85);border-color:rgba(123,226,255,.06);box-shadow:0 0 82px rgba(123,226,255,.18)}
    }

    @media (max-width:420px){
      h1{font-size:28px}
      .tool-btn{font-size:14.5px;padding:10px}
      .tool-btn.wide{font-size:15px;padding:10px 12px}
    }
  </style>
</head>
<body>
  <button class="sun-press" id="sunPress" type="button" aria-label="按下太阳，打开除衣帽间以外的灯并让遮阳帘下降"></button>
  <button class="music-btn" id="musicBtn" aria-label="背景音乐">🎵 音乐：开</button>
  <button class="music-btn" id="updateBtn" aria-label="一键更新" style="right: max(12px, env(safe-area-inset-right)); top: calc(max(12px, env(safe-area-inset-top)) + 52px);">🧁 一键更新</button>
  <div class="home-toast" id="homeToast"></div>
  <div class="nebula-overlay" id="nebulaOverlay" aria-hidden="true">
    <canvas class="nebula-canvas" id="nebulaCanvas"></canvas>
    <button class="nebula-back" id="nebulaBack" type="button">返回主页</button>
    <div class="nebula-stage" aria-hidden="true">
      <div class="nebula-fallback"></div>
      <div class="nebula-core"></div>
      <div class="nebula-ring"></div>
      <div class="nebula-ring two"></div>
      <div class="nebula-ring three"></div>
      <div class="nebula-burst"></div>
    </div>
    <div class="nebula-status" id="nebulaStatus">唤醒太阳</div>
  </div>
  <audio id="homeBgm" preload="auto" loop playsinline webkit-playsinline>
    <source src="./bgm.m4a" type="audio/mp4">
    <source src="./bgm.mp3" type="audio/mpeg">
  </audio>

  <main class="card">
    <h1>Lw&5之家</h1>
    <p class="sub">你们的小工具主站，慢慢长成一个可爱工具箱 ✨</p>

    <section class="grid">
      <button class="tool-btn wheel" type="button" data-tool="wheel" aria-label="打开美食转盘">
        <span>美食转盘</span><span class="emoji">🍜🎡</span>
      </button>
      <button class="tool-btn stock" type="button" data-tool="stock" aria-label="打开仓储管理">
        <span>仓储管理</span><span class="emoji">📦🏠</span>
      </button>
      <button class="tool-btn" type="button" data-tool="travel" aria-label="打开旅行备忘录" style="background:linear-gradient(135deg,rgba(253,242,255,.66),rgba(224,242,254,.58))">
        <span>去玩咯</span><span class="emoji">🏝️🧳</span>
      </button>
      <button class="tool-btn" type="button" data-tool="conflict" aria-label="打开分歧终端机" style="background:linear-gradient(135deg,rgba(255,228,232,.66),rgba(255,240,228,.58))">
        <span>分歧终端机</span><span class="emoji">💕🗣️</span>
      </button>
      <a class="tool-btn wide" href="./smart-home/hyperion.html" aria-label="打开高天之光 许珀里翁" style="background:linear-gradient(135deg,rgba(255,247,204,.62),rgba(220,252,231,.52))">
        <span>高天之光 许珀里翁</span><span class="emoji">💡✨</span>
      </a>
      <a class="tool-btn wide" href="./smart-home/aurora.html" aria-label="打开黎明女神 欧若拉" style="background:linear-gradient(135deg,rgba(255,241,214,.62),rgba(223,247,255,.52))">
        <span>黎明女神 欧若拉</span><span class="emoji">🌅🪟</span>
      </a>
      <a class="tool-btn wide" href="./smart-home/chione.html" aria-label="打开雪之宁芙 喀俄涅" style="background:linear-gradient(135deg,rgba(232,246,255,.62),rgba(210,232,252,.52))">
        <span>雪之宁芙 喀俄涅</span><span class="emoji">❄️🌬️</span>
      </a>
    </section>

    <div class="foot">后续新工具会继续加在这里</div>
  </main>

  <div class="tool-overlay" id="toolOverlay" aria-hidden="true">
    <div class="backdrop" id="toolBackdrop"></div>
    <div class="tool-panel" id="toolPanel" role="dialog" aria-modal="true">
      <div class="tool-topbar">
        <div class="tool-title" id="toolTitle">小工具</div>
        <button class="cute-close" id="toolClose" type="button">🐾 返回主页</button>
      </div>
      <iframe class="tool-iframe" id="toolFrame" title="Lw&5 小工具" loading="eager"></iframe>
    </div>
  </div>

  <script>
    // Register PWA service worker
    (function(){
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    })();

    // One-click update: unregister SW + clear caches + hard reload
    (function(){
      const btn = document.getElementById('updateBtn');
      if (!btn) return;
      btn.addEventListener('click', async () => {
        btn.textContent = '🍬 更新中...';
        try{
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          }
        }catch(_){ }
        // cache-busting reload
        const url = new URL(location.href);
        url.searchParams.set('v', String(Date.now()));
        location.href = url.toString();
      });
    })();

    (function(){
      const sunBtn = document.getElementById('sunPress');
      const toast = document.getElementById('homeToast');
      const nebulaOverlay = document.getElementById('nebulaOverlay');
      const nebulaStatus = document.getElementById('nebulaStatus');
      const nebulaBack = document.getElementById('nebulaBack');
      const LOCAL_API = 'http://192.168.1.105:8788/api/sun-mode';
      const LOCAL_FALLBACK = 'http://192.168.1.105:8788/sun-mode';
      let toastTimer = null;
      let nebulaRun = 0;
      const MIN_NEBULA_MS = 3600;

      function showHomeToast(message){
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
      }

      function delay(ms){
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function showNebula(message){
        const run = ++nebulaRun;
        if (!nebulaOverlay) return { run, startedAt: Date.now() };
        nebulaStatus.textContent = message;
        nebulaOverlay.classList.remove('done');
        nebulaOverlay.classList.add('show');
        nebulaOverlay.setAttribute('aria-hidden', 'false');
        window.dispatchEvent(new CustomEvent('lw5-nebula-start'));
        return { run, startedAt: Date.now() };
      }

      function closeNebula(){
        nebulaRun += 1;
        nebulaOverlay?.classList.remove('show', 'done');
        nebulaOverlay?.setAttribute('aria-hidden', 'true');
        sunBtn.disabled = false;
        sunBtn.classList.remove('working');
      }

      async function finishNebula(run, message){
        if (!nebulaOverlay || run !== nebulaRun) return;
        nebulaStatus.textContent = message;
        nebulaOverlay.classList.add('done');
        window.dispatchEvent(new CustomEvent('lw5-nebula-finish'));
      }

      async function pressSun(){
        if (!sunBtn || sunBtn.disabled) return;
        if (!navigator.onLine) {
          showHomeToast('请先联网，并连接家里的 WiFi。');
          return;
        }

        sunBtn.disabled = true;
        sunBtn.classList.add('working');
        const nebulaStarted = showNebula('唤醒太阳');
        const stageTimer = setTimeout(() => {
          if (nebulaStarted.run === nebulaRun) nebulaStatus.textContent = '星云旋转中';
        }, 1100);

        try {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 14000);
          const response = await fetch(LOCAL_API, {
            method: 'POST',
            mode: 'cors',
            cache: 'no-store',
            signal: controller.signal,
          });
          clearTimeout(timer);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || '本地控制失败');
          await delay(Math.max(0, MIN_NEBULA_MS - (Date.now() - nebulaStarted.startedAt)));
          await finishNebula(nebulaStarted.run, '已完成');
        } catch (error) {
          if (nebulaStarted.run !== nebulaRun) return;
          nebulaStatus.textContent = '切换本地控制';
          await delay(520);
          location.href = LOCAL_FALLBACK;
          return;
        } finally {
          clearTimeout(stageTimer);
          sunBtn.disabled = false;
          sunBtn.classList.remove('working');
        }
      }

      nebulaBack?.addEventListener('click', closeNebula);
      sunBtn?.addEventListener('click', pressSun);
    })();

    (function(){
      // ===== BGM =====
      const bgm = document.getElementById('homeBgm');
      const btn = document.getElementById('musicBtn');
      const KEY = 'lw5_home_bgm_on_v1';
      let on = localStorage.getItem(KEY);
      if (on === null) on = '1'; // 默认开

      function syncBtn(){
        btn.textContent = on === '1' ? '🎵 音乐：开' : '🔇 音乐：关';
      }

      async function tryPlay(){
        if (!bgm || on !== '1') return;
        try {
          bgm.volume = 0.55;
          await bgm.play();
        } catch (e) {
          // iOS/微信常见：需要用户手势
          btn.textContent = '🎵 点我开音乐';
        }
      }

      btn.addEventListener('click', async () => {
        on = (on === '1') ? '0' : '1';
        localStorage.setItem(KEY, on);
        syncBtn();
        if (on === '1') {
          await tryPlay();
        } else {
          try { bgm.pause(); } catch(e) {}
        }
      });

      syncBtn();
      // 尝试自动播放；失败的话用户点按钮即可
      tryPlay();
      // 兜底：首次触摸/点击时再 kick 一次
      const kick = () => { tryPlay(); };
      window.addEventListener('touchstart', kick, { once:true, passive:true });
      window.addEventListener('click', kick, { once:true });

      // 切到后台/锁屏/切应用时自动停音乐；回到前台再按开关状态恢复
      document.addEventListener('visibilitychange', () => {
        if (!bgm) return;
        if (document.hidden) {
          try { bgm.pause(); } catch(e) {}
        } else {
          // 只有在开关为“开”时才尝试恢复
          if (on === '1') tryPlay();
        }
      });
      window.addEventListener('pagehide', () => {
        try { bgm.pause(); } catch(e) {}
      });

      // ===== Tool overlay (iframe) =====
      const overlay = document.getElementById('toolOverlay');
      const backdrop = document.getElementById('toolBackdrop');
      const panel = document.getElementById('toolPanel');
      const frame = document.getElementById('toolFrame');
      const closeBtn = document.getElementById('toolClose');
      const titleEl = document.getElementById('toolTitle');

      function openTool(tool){
        if (!overlay || !panel || !frame) return;

        if (tool === 'wheel'){
          panel.classList.remove('full');
          panel.classList.add('sheet');
          titleEl.textContent = '🍜🎡 美食转盘';
          frame.src = './wheel/?v=' + Date.now();
          location.hash = '#wheel';
        } else if (tool === 'stock'){
          panel.classList.remove('sheet');
          panel.classList.add('full');
          titleEl.textContent = '📦🏠 仓储管理';
          frame.src = './stock/?v=' + Date.now();
          location.hash = '#stock';
        } else if (tool === 'travel'){
          panel.classList.remove('sheet');
          panel.classList.add('full');
          titleEl.textContent = '🏝️🧳 去玩咯';
          frame.src = './travel/?v=' + Date.now();
          location.hash = '#travel';
        } else if (tool === 'conflict'){
          panel.classList.remove('sheet');
          panel.classList.add('full');
          titleEl.textContent = '💕🗣️ 分歧终端机';
          frame.src = './conflict/?v=' + Date.now();
          location.hash = '#conflict';
        }

        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden','false');
      }

      function closeTool(){
        if (!overlay) return;
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden','true');
        // 停留在主页；保留BGM
        frame.src = 'about:blank';
        location.hash = '';
      }

      document.querySelectorAll('[data-tool]').forEach(btnEl => {
        btnEl.addEventListener('click', () => openTool(btnEl.dataset.tool));
      });

      closeBtn?.addEventListener('click', closeTool);
      backdrop?.addEventListener('click', closeTool);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeTool();
      });

      // 子页面（iframe内）发消息回主页关闭
      window.addEventListener('message', (ev) => {
        if (ev?.data?.type === 'lw5-close-tool') closeTool();
      });

      // 支持直接打开 hash
      if (location.hash === '#wheel') openTool('wheel');
      if (location.hash === '#stock') openTool('stock');
      if (location.hash === '#travel') openTool('travel');
      if (location.hash === '#conflict') openTool('conflict');

    })();
  </script>
  <script type="module">
    import * as THREE from './vendor/three.module.min.js';

    const overlay = document.getElementById('nebulaOverlay');
    const canvas = document.getElementById('nebulaCanvas');
    let renderer;
    let scene;
    let camera;
    let group;
    let coreMesh;
    let haloMesh;
    let frame = 0;
    let fallbackMode = false;
    let ctx2d = null;
    let fallbackParticles = [];
    let pointerX = 0;
    let pointerY = 0;
    let targetPointerX = 0;
    let targetPointerY = 0;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let pointerActive = false;
    let dragBoost = 0;
    let spinBoost = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function updatePointerFromPoint(clientX, clientY, active) {
      const nextX = clamp(((clientX / (window.innerWidth || 1)) - .5) * 2, -1.35, 1.35);
      const nextY = clamp(((clientY / (window.innerHeight || 1)) - .5) * 2, -1.35, 1.35);
      if (active) {
        const dx = nextX - lastPointerX;
        const dy = nextY - lastPointerY;
        dragBoost = Math.min(1.8, dragBoost + Math.hypot(dx, dy) * 2.4);
        spinBoost = clamp(spinBoost + dx * .18, -1.1, 1.1);
      }
      targetPointerX = nextX;
      targetPointerY = nextY;
      lastPointerX = nextX;
      lastPointerY = nextY;
    }

    function bindNebulaInteraction() {
      if (!overlay || overlay.dataset.interactionBound === '1') return;
      overlay.dataset.interactionBound = '1';
      const isBackControl = (event) => event.target?.closest?.('.nebula-back');
      const start = (event) => {
        if (isBackControl(event)) return;
        pointerActive = true;
        overlay.classList.add('interacting');
        updatePointerFromPoint(event.clientX, event.clientY, true);
        try { overlay.setPointerCapture(event.pointerId); } catch (_) {}
      };
      const move = (event) => {
        if (!overlay.classList.contains('show')) return;
        updatePointerFromPoint(event.clientX, event.clientY, pointerActive);
      };
      const end = () => {
        pointerActive = false;
        overlay.classList.remove('interacting');
      };
      overlay.addEventListener('pointerdown', start, { passive:true });
      overlay.addEventListener('pointermove', move, { passive:true });
      overlay.addEventListener('pointerup', end, { passive:true });
      overlay.addEventListener('pointercancel', end, { passive:true });
      overlay.addEventListener('pointerleave', end, { passive:true });
      overlay.addEventListener('touchstart', (event) => {
        if (isBackControl(event)) return;
        const touch = event.touches?.[0];
        if (!touch) return;
        pointerActive = true;
        overlay.classList.add('interacting');
        updatePointerFromPoint(touch.clientX, touch.clientY, true);
      }, { passive:true });
      overlay.addEventListener('touchmove', (event) => {
        const touch = event.touches?.[0];
        if (!touch) return;
        updatePointerFromPoint(touch.clientX, touch.clientY, pointerActive);
      }, { passive:true });
      overlay.addEventListener('touchend', end, { passive:true });
      overlay.addEventListener('touchcancel', end, { passive:true });
    }

    function updateInteractionPhysics() {
      const follow = pointerActive ? .32 : .16;
      pointerX += (targetPointerX - pointerX) * follow;
      pointerY += (targetPointerY - pointerY) * follow;
      dragBoost *= pointerActive ? .92 : .86;
      spinBoost *= .93;
    }

    function makeFallbackParticles() {
      fallbackParticles = Array.from({ length: 1400 }, () => {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        const radius = .28 + Math.pow(Math.random(), .48) * 1.28;
        const palette = Math.random();
        return {
          x: Math.sin(phi) * Math.cos(theta) * radius,
          y: Math.cos(phi) * radius,
          z: Math.sin(phi) * Math.sin(theta) * radius,
          hue: palette < .50 ? 188 + Math.random() * 34 : (palette < .78 ? 42 + Math.random() * 18 : (palette < .92 ? 262 + Math.random() * 30 : 12 + Math.random() * 18)),
          size: .65 + Math.random() * 2.15,
          orbit: Math.random() * Math.PI * 2,
        };
      });
    }

    function initFallbackNebula() {
      fallbackMode = true;
      ctx2d = canvas.getContext('2d');
      makeFallbackParticles();
      resizeNebula();
      bindNebulaInteraction();
    }

    function drawFallbackNebula(time = 0) {
      if (!ctx2d) return;
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      ctx2d.clearRect(0, 0, width, height);
      const done = overlay.classList.contains('done');
      const activeLift = pointerActive ? 1.18 : 1;
      const cx = width / 2 + pointerX * 40;
      const cy = height * .47 + pointerY * 32;
      const scale = Math.min(width, height) * .285;
      const ry = time * (done ? .00118 : .00082) + pointerX * .48 + spinBoost;
      const rx = Math.sin(time * .00036) * .26 + pointerY * .34;
      const sinX = Math.sin(rx);
      const cosX = Math.cos(rx);
      const glow = ctx2d.createRadialGradient(cx, cy, 0, cx, cy, scale * 1.55);
      glow.addColorStop(0, done ? 'rgba(255,244,178,.42)' : 'rgba(255,244,178,.26)');
      glow.addColorStop(.32, pointerActive ? 'rgba(87,218,255,.22)' : 'rgba(87,218,255,.12)');
      glow.addColorStop(.68, pointerActive ? 'rgba(173,104,255,.16)' : 'rgba(173,104,255,.08)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx2d.fillStyle = glow;
      ctx2d.fillRect(0, 0, width, height);
      const sorted = fallbackParticles.map((p) => {
        const localY = ry + Math.sin(time * (.0005 + dragBoost * .00024) + p.orbit) * (.12 + dragBoost * .08);
        const sy = Math.sin(localY);
        const cy2 = Math.cos(localY);
        const x1 = p.x * cy2 - p.z * sy;
        const z1 = p.x * sy + p.z * cy2;
        const y1 = p.y * cosX - z1 * sinX;
        const z2 = p.y * sinX + z1 * cosX;
        const perspective = 1.95 / (2.78 + z2);
        return { p, x: cx + x1 * scale * perspective, y: cy + y1 * scale * perspective, z: z2, perspective };
      }).sort((a, b) => a.z - b.z);
      for (const item of sorted) {
        const alpha = Math.max(.14, Math.min(.98, (done ? .48 : .34) + item.z * .27 + dragBoost * .08));
        const r = item.p.size * item.perspective * (done ? 1.18 : 1) * (1 + dragBoost * .20 + (pointerActive ? .10 : 0));
        ctx2d.beginPath();
        ctx2d.fillStyle = 'hsla(' + item.p.hue + ', 95%, 72%, ' + alpha + ')';
        ctx2d.shadowColor = 'hsla(' + item.p.hue + ', 95%, 72%, .75)';
        ctx2d.shadowBlur = done ? 14 : 9;
        ctx2d.arc(item.x, item.y, r, 0, Math.PI * 2);
        ctx2d.fill();
      }
      ctx2d.lineWidth = 1;
      for (let i = 0; i < 3; i += 1) {
        ctx2d.save();
        ctx2d.translate(cx, cy);
        ctx2d.rotate(time * (.00045 + i * .00016 + dragBoost * .00018) * (i === 1 ? -1 : 1) + pointerX * .48);
        ctx2d.scale(1, .26 + i * .08);
        ctx2d.strokeStyle = i === 1 ? 'rgba(255,225,139,.36)' : 'rgba(143,229,255,.34)';
        ctx2d.shadowColor = ctx2d.strokeStyle;
        ctx2d.shadowBlur = 12;
        ctx2d.beginPath();
        ctx2d.arc(0, 0, scale * (.92 + i * .16), 0, Math.PI * 2);
        ctx2d.stroke();
        ctx2d.restore();
      }
      const core = ctx2d.createRadialGradient(cx - scale * .05, cy - scale * .07, 0, cx, cy, scale * .22);
      core.addColorStop(0, 'rgba(255,255,255,.98)');
      core.addColorStop(.42, 'rgba(255,239,143,.86)');
      core.addColorStop(1, 'rgba(255,169,86,0)');
      ctx2d.fillStyle = core;
      ctx2d.beginPath();
      ctx2d.arc(cx, cy, scale * .25 * (done ? 1.14 : 1) * activeLift, 0, Math.PI * 2);
      ctx2d.fill();
      if (done) {
        const pulse = ((time * .0012) % 1);
        ctx2d.strokeStyle = 'rgba(255,246,188,' + (.45 * (1 - pulse)) + ')';
        ctx2d.lineWidth = 1.5;
        ctx2d.shadowColor = 'rgba(255,246,188,.7)';
        ctx2d.shadowBlur = 20;
        ctx2d.beginPath();
        ctx2d.arc(cx, cy, scale * (.55 + pulse * 1.15), 0, Math.PI * 2);
        ctx2d.stroke();
      }
      ctx2d.shadowBlur = 0;
    }

    function makePositions(count, inner, outer) {
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i += 1) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        const radius = inner + Math.pow(Math.random(), .52) * (outer - inner);
        positions[i * 3] = Math.sin(phi) * Math.cos(theta) * radius;
        positions[i * 3 + 1] = Math.cos(phi) * radius;
        positions[i * 3 + 2] = Math.sin(phi) * Math.sin(theta) * radius;
      }
      return positions;
    }

    function makeCloud(count, color, size, inner, outer) {
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(makePositions(count, inner, outer), 3));
      const material = new THREE.PointsMaterial({
        color,
        size,
        transparent: true,
        opacity: .86,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
      });
      return new THREE.Points(geometry, material);
    }

    function initNebula() {
      if (renderer || fallbackMode || !canvas) return;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, powerPreference: 'high-performance' });
      } catch (error) {
        initFallbackNebula();
        return;
      }
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(48, 1, .1, 100);
      camera.position.z = 6.1;
      group = new THREE.Group();
      group.add(makeCloud(2100, 0xb9f3ff, .066, .32, 1.36));
      group.add(makeCloud(1260, 0xffdd8a, .084, .62, 1.58));
      group.add(makeCloud(960, 0xd2a8ff, .058, .16, 1.04));
      group.add(makeCloud(420, 0xff9a6f, .052, 1.08, 1.78));
      haloMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.72, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xffdc86, transparent: true, opacity: .16, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      coreMesh = new THREE.Mesh(
        new THREE.SphereGeometry(.18, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xfff1a8, transparent: true, opacity: .92, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      group.add(haloMesh);
      group.add(coreMesh);
      [
        { radius:1.18, color:0x9de7ff, opacity:.34, rx:.53, rz:.08 },
        { radius:1.43, color:0xffdd8a, opacity:.28, rx:.62, rz:.72 },
        { radius:.92, color:0xd2a8ff, opacity:.30, rx:.46, rz:-.52 },
      ].forEach((item) => {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(item.radius, .006, 8, 180),
          new THREE.MeshBasicMaterial({ color:item.color, transparent:true, opacity:item.opacity, blending:THREE.AdditiveBlending, depthWrite:false })
        );
        ring.rotation.x = Math.PI * item.rx;
        ring.rotation.z = item.rz;
        group.add(ring);
      });
      scene.add(group);
      resizeNebula();
      window.addEventListener('resize', resizeNebula);
      bindNebulaInteraction();
    }

    function resizeNebula() {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      if (fallbackMode && ctx2d) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
        return;
      }
      if (!renderer || !camera) return;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function animateNebula(time = 0) {
      if (!overlay?.classList.contains('show')) {
        frame = 0;
        return;
      }
      frame = requestAnimationFrame(animateNebula);
      updateInteractionPhysics();
      if (fallbackMode) {
        drawFallbackNebula(time);
        return;
      }
      const done = overlay.classList.contains('done');
      group.rotation.y += (done ? .014 : .0095) + dragBoost * .016 + Math.abs(spinBoost) * .018;
      group.rotation.x = Math.sin(time * .00042) * .24 + pointerY * .34;
      group.rotation.z = Math.cos(time * .00032) * .10 - pointerX * .34 + spinBoost * .52;
      group.position.x = pointerX * .18;
      group.position.y = -pointerY * .14;
      if (coreMesh) {
        const coreScale = (done ? 1.34 : 1 + Math.sin(time * .0046) * .16) + dragBoost * .16 + (pointerActive ? .10 : 0);
        coreMesh.scale.setScalar(coreScale);
      }
      if (haloMesh) {
        const haloScale = (done ? 1.35 : 1 + Math.sin(time * .0026) * .08) + dragBoost * .10;
        haloMesh.scale.setScalar(haloScale);
        haloMesh.material.opacity = done ? .24 : .14 + Math.sin(time * .002) * .03 + dragBoost * .06;
      }
      const scale = (done ? 1.16 : 1 + Math.sin(time * .0022) * .022) + dragBoost * .035 + (pointerActive ? .025 : 0);
      group.scale.setScalar(scale);
      renderer.render(scene, camera);
    }

    function startNebula() {
      initNebula();
      if (!frame) animateNebula();
    }

    window.addEventListener('lw5-nebula-start', startNebula);
    window.addEventListener('lw5-nebula-finish', startNebula);
    if (overlay?.classList.contains('show')) startNebula();
  </script>
