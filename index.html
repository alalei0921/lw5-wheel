<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6F0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lw&5" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <title>Lw&5之家</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;
      color:#2d2d2d;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,245,250,.25), rgba(255,250,240,.45)),
        url('./home-bg.jpg') center/cover no-repeat;
      z-index:-2;
      transform:scale(1.02);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.35), transparent 35%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,.25), transparent 40%);
      z-index:-1;
    }
    .card{
      width:min(460px,92%);
      border-radius:24px;
      background:rgba(255,255,255,.52);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,.62);
      box-shadow:0 14px 34px rgba(112,76,52,.16);
      padding:18px 16px 14px;
      text-align:center;
      transform: translateY(-52px);
    }
    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      color:#7c4a37;
      text-shadow:0 2px 8px rgba(255,255,255,.55);
    }
    .sub{
      margin:6px 0 14px;
      color:#7b6f68;
      font-size:13px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .tool-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      text-decoration:none;
      border-radius:18px;
      padding:12px 14px;
      font-size:16px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.7);
      box-shadow:0 12px 20px rgba(130,99,76,.13);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:#5b4438;
    }
    .tool-btn:active{transform:translateY(1px) scale(.98)}
    .tool-btn:hover{transform:translateY(-2px); box-shadow:0 14px 24px rgba(130,99,76,.2)}
    .wheel{background:linear-gradient(135deg,#ffe6f3,#fff4d8)}
    .stock{background:linear-gradient(135deg,#e8f7ff,#eaffea)}
    .emoji{font-size:24px}
    .foot{margin-top:14px;font-size:12px;color:#8a7a71}

    /* 工具面板（保持在同一页里，BGM 不断） */
    .tool-overlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 80;
    }
    .tool-overlay.show{ display:block; }
    .tool-overlay .backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
    }
    .tool-panel{
      position:absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 96vw);
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(0,0,0,.22);
      overflow: hidden;
    }
    .tool-panel.full{
      top: 10px;
      bottom: 10px;
    }
    .tool-panel.sheet{
      bottom: 10px;
      height: min(78vh, 720px);
    }
    .tool-topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
      border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .tool-title{
      font-weight: 900;
      color:#7c4a37;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .cute-close{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.75);
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      font-weight: 900;
      color:#111827;
      cursor:pointer;
      user-select:none;
    }
    .cute-close:active{ transform: scale(.98); }

    .tool-iframe{
      width: 100%;
      height: calc(100% - 50px);
      border: 0;
      background: #fff;
    }

    .music-btn{
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 60;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.62);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:0 14px 28px rgba(112,76,52,.16);
      font-weight:800;
      color:#7c4a37;
      cursor:pointer;
      user-select:none;
    }
    .music-btn:active{ transform: translateY(1px) scale(.98); }

    @media (max-width:420px){
      h1{font-size:30px}
      .tool-btn{font-size:17px;padding:14px 16px}
    }
  </style>
</head>
<body>
  <button class="music-btn" id="musicBtn" aria-label="背景音乐">🎵 音乐：开</button>
  <audio id="homeBgm" preload="auto" loop playsinline webkit-playsinline>
    <source src="./bgm.m4a" type="audio/mp4">
    <source src="./bgm.mp3" type="audio/mpeg">
  </audio>

  <main class="card">
    <h1>Lw&5之家</h1>
    <p class="sub">你们的小工具主站，慢慢长成一个可爱工具箱 ✨</p>

    <section class="grid">
      <button class="tool-btn wheel" type="button" data-tool="wheel" aria-label="打开美食转盘">
        <span>美食转盘</span><span class="emoji">🍜🎡</span>
      </button>
      <button class="tool-btn stock" type="button" data-tool="stock" aria-label="打开仓储管理">
        <span>仓储管理</span><span class="emoji">📦🏠</span>
      </button>
      <button class="tool-btn" type="button" data-tool="travel" aria-label="打开旅行备忘录" style="background:linear-gradient(135deg,#fdf2ff,#e0f2fe)">
        <span>去玩咯</span><span class="emoji">🏝️🧳</span>
      </button>
    </section>

    <div class="foot">后续新工具会继续加在这里</div>
  </main>

  <div class="tool-overlay" id="toolOverlay" aria-hidden="true">
    <div class="backdrop" id="toolBackdrop"></div>
    <div class="tool-panel" id="toolPanel" role="dialog" aria-modal="true">
      <div class="tool-topbar">
        <div class="tool-title" id="toolTitle">小工具</div>
        <button class="cute-close" id="toolClose" type="button">🐾 返回主页</button>
      </div>
      <iframe class="tool-iframe" id="toolFrame" title="Lw&5 小工具" loading="eager"></iframe>
    </div>
  </div>

  <script>
    // Register PWA service worker
    (function(){
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    })();

    (function(){
      // ===== BGM =====
      const bgm = document.getElementById('homeBgm');
      const btn = document.getElementById('musicBtn');
      const KEY = 'lw5_home_bgm_on_v1';
      let on = localStorage.getItem(KEY);
      if (on === null) on = '1'; // 默认开

      function syncBtn(){
        btn.textContent = on === '1' ? '🎵 音乐：开' : '🔇 音乐：关';
      }

      async function tryPlay(){
        if (!bgm || on !== '1') return;
        try {
          bgm.volume = 0.55;
          await bgm.play();
        } catch (e) {
          // iOS/微信常见：需要用户手势
          btn.textContent = '🎵 点我开音乐';
        }
      }

      btn.addEventListener('click', async () => {
        on = (on === '1') ? '0' : '1';
        localStorage.setItem(KEY, on);
        syncBtn();
        if (on === '1') {
          await tryPlay();
        } else {
          try { bgm.pause(); } catch(e) {}
        }
      });

      syncBtn();
      // 尝试自动播放；失败的话用户点按钮即可
      tryPlay();
      // 兜底：首次触摸/点击时再 kick 一次
      const kick = () => { tryPlay(); };
      window.addEventListener('touchstart', kick, { once:true, passive:true });
      window.addEventListener('click', kick, { once:true });

      // 切到后台/锁屏/切应用时自动停音乐；回到前台再按开关状态恢复
      document.addEventListener('visibilitychange', () => {
        if (!bgm) return;
        if (document.hidden) {
          try { bgm.pause(); } catch(e) {}
        } else {
          // 只有在开关为“开”时才尝试恢复
          if (on === '1') tryPlay();
        }
      });
      window.addEventListener('pagehide', () => {
        try { bgm.pause(); } catch(e) {}
      });

      // ===== Tool overlay (iframe) =====
      const overlay = document.getElementById('toolOverlay');
      const backdrop = document.getElementById('toolBackdrop');
      const panel = document.getElementById('toolPanel');
      const frame = document.getElementById('toolFrame');
      const closeBtn = document.getElementById('toolClose');
      const titleEl = document.getElementById('toolTitle');

      function openTool(tool){
        if (!overlay || !panel || !frame) return;

        if (tool === 'wheel'){
          panel.classList.remove('full');
          panel.classList.add('sheet');
          titleEl.textContent = '🍜🎡 美食转盘';
          frame.src = './wheel/';
          location.hash = '#wheel';
        } else if (tool === 'stock'){
          panel.classList.remove('sheet');
          panel.classList.add('full');
          titleEl.textContent = '📦🏠 仓储管理';
          frame.src = './stock/';
          location.hash = '#stock';
        } else if (tool === 'travel'){
          panel.classList.remove('sheet');
          panel.classList.add('full');
          titleEl.textContent = '🏝️🧳 去玩咯';
          frame.src = './travel/';
          location.hash = '#travel';
        }

        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden','false');
      }

      function closeTool(){
        if (!overlay) return;
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden','true');
        // 停留在主页；保留BGM
        frame.src = 'about:blank';
        location.hash = '';
      }

      document.querySelectorAll('[data-tool]').forEach(btnEl => {
        btnEl.addEventListener('click', () => openTool(btnEl.dataset.tool));
      });

      closeBtn?.addEventListener('click', closeTool);
      backdrop?.addEventListener('click', closeTool);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeTool();
      });

      // 子页面（iframe内）发消息回主页关闭
      window.addEventListener('message', (ev) => {
        if (ev?.data?.type === 'lw5-close-tool') closeTool();
      });

      // 支持直接打开 hash
      if (location.hash === '#wheel') openTool('wheel');
      if (location.hash === '#stock') openTool('stock');
      if (location.hash === '#travel') openTool('travel');

    })();
  </script>
</body>
</html>
