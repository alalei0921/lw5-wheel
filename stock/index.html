<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭囤货管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,248,235,0.18), rgba(255,248,235,0.18)), url('./bg.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: -1;
        }
        body > * {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .add-form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .add-form h2 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .form-row select,
        .form-row input {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #007AFF;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-success {
            background: #34C759;
            color: white;
        }
        .btn-danger {
            background: #FF3B30;
            color: white;
            padding: 6px 12px;
            font-size: 14px;
        }
        .btn-secondary {
            background: #8E8E93;
            color: white;
        }
        .inventory {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f8f8;
            border-bottom: 1px solid #eee;
        }
        .header-left {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-cloud-mini {
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1d4ed8;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .inventory-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .inventory-item:last-child {
            border-bottom: none;
        }
        .item-info {
            flex: 1;
            min-width: 200px;
        }
        .item-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }
        .item-details {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        .item-stock {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }
        .stock-normal {
            background: #E8F5E9;
            color: #2E7D32;
        }
        .stock-warning {
            background: #FFF3E0;
            color: #E65100;
        }
        .stock-danger {
            background: #FFEBEE;
            color: #C62828;
        }
        .item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .item-actions input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab.active {
            background: #007AFF;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .cloud-box {
            margin-top: 14px;
            padding: 12px;
            background: #f7fbff;
            border: 1px solid #dbeafe;
            border-radius: 10px;
        }
        .cloud-box h3 {
            margin: 0 0 10px;
            font-size: 15px;
        }
        .cloud-status {
            margin-top: 8px;
            font-size: 13px;
            color: #0369a1;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>🏠 家庭囤货管理</h1>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('inventory', this)">库存列表</button>
        <button class="tab" onclick="switchTab('add', this)">添加新物品</button>
        <button class="tab" onclick="switchTab('settings', this)">消耗设置</button>
    </div>

    <div id="tab-inventory">
        <div class="add-form">
            <div class="form-row">
                <select id="restock-item">
                    <option value="">选择物品...</option>
                </select>
                <input type="number" id="restock-qty" placeholder="数量" min="1">
                <button class="btn btn-primary" onclick="addStock()">录入</button>
            </div>
        </div>
        
        <div class="inventory">
            <div class="inventory-header">
                <div class="header-left">
                    <span>共 <strong id="total-items">0</strong> 项</span>
                    <button class="btn-cloud-mini" onclick="openCloudSyncSettings()">☁️ 云同步</button>
                </div>
                <span id="warning-count"></span>
            </div>
            <div id="inventory-list"></div>
        </div>
    </div>

    <div id="tab-add" style="display: none;">
        <div class="add-form">
            <h2>添加新物品</h2>
            <div class="form-row">
                <input type="text" id="new-item-name" placeholder="物品名称">
                <input type="text" id="new-item-unit" placeholder="单位（如：包、瓶）">
            </div>
            <div class="form-row">
                <input type="number" id="new-item-days" placeholder="每单位消耗天数" step="0.1">
                <input type="number" id="new-item-qty" placeholder="当前数量" min="0">
            </div>
            <button class="btn btn-success" onclick="addNewItem()">添加物品</button>
        </div>
    </div>

    <div id="tab-settings" style="display: none;">
        <div class="add-form">
            <h2>管理物品清单</h2>
            <div class="cloud-box">
                <h3>☁️ 云端同步（Supabase）</h3>
                <div class="form-row">
                    <input type="text" id="sb-url" placeholder="Supabase URL">
                </div>
                <div class="form-row">
                    <input type="text" id="sb-key" placeholder="Supabase anon key">
                </div>
                <div class="form-row">
                    <input type="text" id="sb-household" placeholder="家庭ID（如：lw5-home）">
                </div>
                <div class="form-row">
                    <button class="btn btn-primary" onclick="saveCloudConfig()">保存云配置</button>
                    <button class="btn btn-secondary" onclick="pullFromCloud()">从云端拉取</button>
                </div>
                <div class="cloud-status" id="cloud-status">当前：本地模式（未连接云端）</div>
            </div>
            <div id="settings-list"></div>
        </div>
    </div>

    <!-- 编辑消耗天数弹窗 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>调整消耗天数</h3>
            <input type="number" id="edit-days" placeholder="每单位消耗天数" step="0.1">
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 默认物品清单
        const defaultItems = [
            { name: '家庭电费', unit: '元', daysPerUnit: 0.25, qty: 0 },
            { name: '充电桩电费', unit: '元', daysPerUnit: 0.25, qty: 0 },
            { name: '一次性内裤', unit: '条', daysPerUnit: 1, qty: 0 },
            { name: '一次性袜子', unit: '双', daysPerUnit: 1, qty: 0 },
            { name: '抽纸', unit: '包', daysPerUnit: 4, qty: 0 },
            { name: '洗脸巾', unit: '包', daysPerUnit: 10, qty: 0 },
            { name: '湿厕纸', unit: '包', daysPerUnit: 10, qty: 0 },
            { name: '保湿喷雾', unit: '瓶', daysPerUnit: 30, qty: 0 },
            { name: '牙膏', unit: '支', daysPerUnit: 45, qty: 0 },
            { name: '护发素', unit: '瓶', daysPerUnit: 60, qty: 0 },
            { name: '洗衣液', unit: '瓶', daysPerUnit: 45, qty: 0 },
            { name: '柔顺剂', unit: '瓶', daysPerUnit: 60, qty: 0 },
            { name: '扫地机器人尘盒', unit: '盒', daysPerUnit: 40, qty: 0 }
        ];

        // 从localStorage加载数据
        let inventory = JSON.parse(localStorage.getItem('inventory')) || JSON.parse(JSON.stringify(defaultItems));

        let supabaseClient = null;
        let cloudConfig = JSON.parse(localStorage.getItem('cloudConfig') || '{}');

        function getCloudStatusEl() {
            return document.getElementById('cloud-status');
        }

        function setCloudStatus(text) {
            const el = getCloudStatusEl();
            if (el) el.textContent = text;
        }

        function isCloudEnabled() {
            return !!(cloudConfig.url && cloudConfig.key && cloudConfig.householdId);
        }

        function getSupabaseClient() {
            if (!isCloudEnabled()) return null;
            if (!supabaseClient) {
                supabaseClient = window.supabase.createClient(cloudConfig.url, cloudConfig.key);
            }
            return supabaseClient;
        }

        async function saveData() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            if (!isCloudEnabled()) return;

            try {
                const sb = getSupabaseClient();
                const { error } = await sb
                    .from('household_inventory')
                    .upsert({
                        household_id: cloudConfig.householdId,
                        inventory,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'household_id' });

                if (error) throw error;
                setCloudStatus('当前：云端已连接（自动同步中）');
            } catch (e) {
                setCloudStatus('云同步失败：' + (e.message || '请检查配置/表结构'));
            }
        }

        async function pullFromCloud() {
            if (!isCloudEnabled()) {
                alert('请先填写并保存云配置');
                return;
            }
            try {
                const sb = getSupabaseClient();
                const { data, error } = await sb
                    .from('household_inventory')
                    .select('inventory')
                    .eq('household_id', cloudConfig.householdId)
                    .maybeSingle();

                if (error) throw error;
                if (data?.inventory && Array.isArray(data.inventory)) {
                    inventory = data.inventory;
                    localStorage.setItem('inventory', JSON.stringify(inventory));
                    renderInventory();
                    renderSettings();
                    setCloudStatus('已从云端拉取最新数据');
                } else {
                    await saveData();
                    setCloudStatus('云端无历史数据，已上传当前本地数据');
                }
            } catch (e) {
                setCloudStatus('拉取失败：' + (e.message || '请检查配置/网络'));
            }
        }

        function saveCloudConfig() {
            const url = document.getElementById('sb-url').value.trim();
            const key = document.getElementById('sb-key').value.trim();
            const householdId = document.getElementById('sb-household').value.trim();
            if (!url || !key || !householdId) {
                alert('请填写完整 Supabase 配置');
                return;
            }

            cloudConfig = { url, key, householdId };
            supabaseClient = null;
            localStorage.setItem('cloudConfig', JSON.stringify(cloudConfig));
            setCloudStatus('配置已保存，正在连接云端...');
            pullFromCloud();
        }

        function fillCloudConfigForm() {
            const urlEl = document.getElementById('sb-url');
            const keyEl = document.getElementById('sb-key');
            const householdEl = document.getElementById('sb-household');
            if (urlEl) urlEl.value = cloudConfig.url || '';
            if (keyEl) keyEl.value = cloudConfig.key || '';
            if (householdEl) householdEl.value = cloudConfig.householdId || '';

            if (isCloudEnabled()) {
                setCloudStatus('当前：已保存云配置，点击“从云端拉取”可同步');
            } else {
                setCloudStatus('当前：本地模式（未连接云端）');
            }
        }

        // 计算预计用完日期
        function calculateExhaustDate(qty, daysPerUnit) {
            if (qty <= 0) return null;
            const daysLeft = qty * daysPerUnit;
            const exhaustDate = new Date();
            exhaustDate.setDate(exhaustDate.getDate() + daysLeft);
            return {
                daysLeft: Math.round(daysLeft),
                date: exhaustDate.toLocaleDateString('zh-CN')
            };
        }

        // 获取库存状态
        function getStockStatus(daysLeft) {
            if (daysLeft === null || daysLeft <= 0) return { class: 'stock-danger', text: '已用完' };
            if (daysLeft <= 7) return { class: 'stock-danger', text: `剩${Math.round(daysLeft)}天` };
            if (daysLeft <= 30) return { class: 'stock-warning', text: `剩${Math.round(daysLeft)}天` };
            return { class: 'stock-normal', text: `剩${Math.round(daysLeft)}天` };
        }

        // 渲染库存列表
        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const select = document.getElementById('restock-item');
            
            if (inventory.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无物品，请先添加</div>';
                return;
            }

            // 更新下拉菜单
            select.innerHTML = '<option value="">选择物品...</option>' + 
                inventory.map((item, index) => `<option value="${index}">${item.name}</option>`).join('');

            // 渲染列表
            list.innerHTML = inventory.map((item, index) => {
                const exhaust = calculateExhaustDate(item.qty, item.daysPerUnit);
                const status = getStockStatus(exhaust ? exhaust.daysLeft : 0);
                return `
                    <div class="inventory-item">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-details">${item.qty} ${item.unit} | 每${item.daysPerUnit}天消耗1${item.unit}</div>
                        </div>
                        <div class="item-stock ${status.class}">${status.text}</div>
                        ${exhaust ? `<div style="font-size:12px;color:#999;">预计${exhaust.date}用完</div>` : ''}
                        <div class="item-actions">
                            <input type="number" id="qty-${index}" placeholder="数量" min="1" value="${item.qty}">
                            <button class="btn btn-primary" onclick="updateQty(${index})">更新</button>
                            <button class="btn btn-danger" onclick="deleteItem(${index})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');

            // 更新统计
            document.getElementById('total-items').textContent = inventory.length;
            const warningItems = inventory.filter(item => {
                const exhaust = calculateExhaustDate(item.qty, item.daysPerUnit);
                return exhaust && exhaust.daysLeft <= 30;
            });
            document.getElementById('warning-count').textContent = warningItems.length > 0 
                ? `⚠️ ${warningItems.length}项即将用完` : '';
        }

        // 录入库存
        function addStock() {
            const index = document.getElementById('restock-item').value;
            const qty = parseInt(document.getElementById('restock-qty').value);
            
            if (index === '' || isNaN(qty) || qty <= 0) {
                alert('请选择物品并输入有效数量');
                return;
            }

            inventory[index].qty = qty;
            saveData();
            renderInventory();
            document.getElementById('restock-qty').value = '';
        }

        // 直接更新数量
        function updateQty(index) {
            const qty = parseInt(document.getElementById(`qty-${index}`).value);
            if (isNaN(qty) || qty < 0) {
                alert('请输入有效数量');
                return;
            }
            inventory[index].qty = qty;
            saveData();
            renderInventory();
        }

        // 添加新物品
        function addNewItem() {
            const name = document.getElementById('new-item-name').value.trim();
            const unit = document.getElementById('new-item-unit').value.trim();
            const daysPerUnit = parseFloat(document.getElementById('new-item-days').value);
            const qty = parseInt(document.getElementById('new-item-qty').value) || 0;

            if (!name || !unit || isNaN(daysPerUnit)) {
                alert('请填写完整信息');
                return;
            }

            inventory.push({ name, unit, daysPerUnit, qty });
            saveData();
            renderInventory();
            switchTab('inventory');
            
            // 清空表单
            document.getElementById('new-item-name').value = '';
            document.getElementById('new-item-unit').value = '';
            document.getElementById('new-item-days').value = '';
            document.getElementById('new-item-qty').value = '';
        }

        // 删除物品
        function deleteItem(index) {
            if (confirm(`确定要删除"${inventory[index].name}"吗？`)) {
                inventory.splice(index, 1);
                saveData();
                renderInventory();
                renderSettings();
            }
        }

        let editingIndex = null;

        // 打开编辑弹窗
        function openEdit(index) {
            editingIndex = index;
            document.getElementById('edit-days').value = inventory[index].daysPerUnit;
            document.getElementById('edit-modal').classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('edit-modal').classList.remove('show');
            editingIndex = null;
        }

        // 保存编辑
        function saveEdit() {
            const daysPerUnit = parseFloat(document.getElementById('edit-days').value);
            if (isNaN(daysPerUnit) || daysPerUnit <= 0) {
                alert('请输入有效的消耗天数');
                return;
            }
            inventory[editingIndex].daysPerUnit = daysPerUnit;
            saveData();
            closeModal();
            renderInventory();
            renderSettings();
        }

        // 渲染设置页面
        function renderSettings() {
            const settingsList = document.getElementById('settings-list');
            settingsList.innerHTML = inventory.map((item, index) => `
                <div class="inventory-item">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">单位: ${item.unit} | 消耗: ${item.daysPerUnit}天/${item.unit}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-primary" onclick="openEdit(${index})">调整消耗</button>
                        <button class="btn btn-danger" onclick="deleteItem(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function openCloudSyncSettings() {
            switchTab('settings');
            const box = document.querySelector('.cloud-box');
            if (box) box.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 切换标签页
        function switchTab(tab, btn = null) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
            
            if (btn) {
                btn.classList.add('active');
            } else {
                const activeBtn = document.querySelector(`.tab[onclick*="'${tab}'"]`);
                if (activeBtn) activeBtn.classList.add('active');
            }
            
            document.getElementById(`tab-${tab}`).style.display = 'block';
            
            if (tab === 'settings') {
                renderSettings();
                fillCloudConfigForm();
            }
        }

        // 初始化
        renderInventory();
        fillCloudConfigForm();
        if (isCloudEnabled()) {
            pullFromCloud();
        }

    </script>
</body>
</html>
