<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffe8ef" />
  <title>黎明女神 欧若拉</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{min-height:100%;background:#f8dbe3}
    body{margin:0;min-height:100vh;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;overflow-x:hidden;background:transparent}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(255,248,252,.02),rgba(255,248,252,.02)),url('./aurora-bg.jpg') center/cover no-repeat}
    .shell{width:min(760px,100%);margin:0 auto;padding:18px 14px 30px}
    header,.panel,.card{border:1px solid rgba(255,255,255,.58);background:rgba(255,255,255,.20);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);box-shadow:0 14px 32px rgba(75,52,30,.12)}
    header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;padding:14px;border-radius:18px}
    h1{margin:0;font-size:28px;line-height:1.08;color:#111827;text-shadow:0 2px 10px rgba(255,255,255,.72);letter-spacing:0}
    .status{margin-top:4px;font-size:14px;font-weight:800;color:rgba(17,24,39,.74)}
    .home-btn,.local-btn,button{min-height:48px;border:1px solid rgba(255,255,255,.72);border-radius:999px;background:rgba(255,255,255,.50);color:#111827;font:inherit;font-weight:850;text-decoration:none;display:grid;place-items:center;box-shadow:0 12px 24px rgba(75,52,30,.10)}
    .home-btn,.local-btn{padding:0 18px;white-space:nowrap}
    .local-btn{background:rgba(255,255,255,.64)}
    .local-btn.connected{background:rgba(64,160,104,.74);color:#fff;border-color:rgba(255,255,255,.86);box-shadow:0 14px 28px rgba(33,104,62,.22)}
    button{cursor:pointer}
    .panel{border-radius:18px;padding:14px;margin-bottom:12px}
    .toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .open{background:rgba(89,177,126,.54);color:#fff}
    .close{background:rgba(224,103,83,.56);color:#fff}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .card{border-radius:16px;padding:14px}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .name{font-size:19px;font-weight:900;overflow-wrap:anywhere}
    .state{font-size:13px;font-weight:800;color:rgba(17,24,39,.66);text-align:right}
    .controls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%) translateY(18px);z-index:20;width:min(420px,calc(100% - 28px));padding:12px 14px;border-radius:16px;background:rgba(17,24,39,.90);color:#fff;font-weight:850;text-align:center;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (max-width:560px){.shell{padding:14px}.toolbar,.controls{grid-template-columns:1fr}header{flex-direction:column}.home-btn,.local-btn{width:100%}h1{font-size:25px}.card-head{flex-direction:column}.state{text-align:left}}
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>黎明女神 欧若拉</h1>
        <div id="status" class="status">预览模式</div>
      </div>
      <a class="home-btn" href="../">返回主页</a>
    </header>
    <section class="panel">
      <a class="local-btn" id="localControl" href="http://192.168.1.105:8788/aurora" target="_top">连接家里 WiFi 后进入本地控制</a>
    </section>

    <section class="toolbar">
      <button type="button" data-locked>刷新</button>
      <button class="open" type="button" data-locked>全部打开</button>
      <button class="close" type="button" data-locked>全部关闭</button>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-head">
          <div class="name">客厅遮阳帘</div>
          <div class="state">需要连接家里 WiFi</div>
        </div>
        <div class="controls">
          <button class="open" type="button" data-locked>打开</button>
          <button type="button" data-locked>停止</button>
          <button class="close" type="button" data-locked>关闭</button>
        </div>
      </article>
      <article class="card">
        <div class="card-head">
          <div class="name">主卧遮阳帘</div>
          <div class="state">需要连接家里 WiFi</div>
        </div>
        <div class="controls">
          <button class="open" type="button" data-locked>打开</button>
          <button type="button" data-locked>停止</button>
          <button class="close" type="button" data-locked>关闭</button>
        </div>
      </article>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const LOCAL_LABEL = '请先连接家里的 WiFi，再点“进入本地控制”。';
    const LOCAL_READY_LABEL = '请点上方按钮进入本地控制后操作。';
    const LOCAL_CHECK_URL = 'http://192.168.1.105:8788/assets/aurora-bg.jpg';
    const toastEl = document.getElementById('toast');
    const statusEl = document.getElementById('status');
    const localControlEl = document.getElementById('localControl');
    let localAvailable = false;
    function showToast(message){
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 2600);
    }
    function setLocalAvailable(next){
      localAvailable = next;
      localControlEl.classList.toggle('connected', next);
      localControlEl.textContent = next ? '本地控制可用，点击进入' : '连接家里 WiFi 后进入本地控制';
      statusEl.textContent = next ? '本地可用' : (navigator.onLine ? '预览模式' : '请联网');
    }
    function probeLocal(){
      if (!navigator.onLine) {
        setLocalAvailable(false);
        return;
      }
      const image = new Image();
      const timer = setTimeout(() => {
        image.onload = null;
        image.onerror = null;
        setLocalAvailable(false);
      }, 1800);
      image.onload = () => {
        clearTimeout(timer);
        setLocalAvailable(true);
      };
      image.onerror = () => {
        clearTimeout(timer);
        setLocalAvailable(false);
      };
      image.src = LOCAL_CHECK_URL + '?probe=' + Date.now();
    }
    document.addEventListener('click', (event) => {
      if (event.target.closest('[data-locked]')) showToast(navigator.onLine ? (localAvailable ? LOCAL_READY_LABEL : LOCAL_LABEL) : '请先联网。');
    });
    window.addEventListener('online', probeLocal);
    window.addEventListener('offline', probeLocal);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) probeLocal(); });
    probeLocal();
  </script>
</body>
</html>
