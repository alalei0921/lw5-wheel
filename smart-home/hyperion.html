<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#fff3d1" />
  <title>高天之光 许珀里翁</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{min-height:100%;background:#f7dfad}
    body{margin:0;min-height:100vh;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",Arial,sans-serif;overflow-x:hidden;background:transparent}
    body::before{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(255,248,235,.015),rgba(255,248,235,.015)),url('./hyperion-bg.jpg') center/cover no-repeat}
    .shell{width:min(760px,100%);margin:0 auto;padding:18px 14px 30px}
    header,.panel,.light{border:1px solid rgba(255,255,255,.58);background:rgba(255,255,255,.20);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);box-shadow:0 14px 32px rgba(75,52,30,.12)}
    header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;padding:14px;border-radius:18px}
    h1{margin:0;font-size:28px;line-height:1.08;color:#111827;text-shadow:0 2px 10px rgba(255,255,255,.72);letter-spacing:0}
    .status{margin-top:4px;font-size:14px;font-weight:800;color:rgba(17,24,39,.74)}
    .home-btn,.local-btn,button{min-height:48px;border:1px solid rgba(255,255,255,.72);border-radius:999px;background:rgba(255,255,255,.50);color:#111827;font:inherit;font-weight:850;text-decoration:none;display:grid;place-items:center;box-shadow:0 12px 24px rgba(75,52,30,.10)}
    .home-btn,.local-btn{padding:0 18px;white-space:nowrap}
    .local-btn{background:rgba(255,255,255,.64)}
    button{cursor:pointer}
    .notice{display:none;margin:0 0 12px;padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.72);background:rgba(255,255,255,.36);backdrop-filter:blur(4px);font-size:14px;font-weight:850;color:#111827;box-shadow:0 12px 26px rgba(75,52,30,.10)}
    .notice.show{display:block}
    .panel{border-radius:18px;padding:14px;margin-bottom:12px}
    .toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .toolbar button:nth-child(2){background:rgba(89,177,126,.54);color:#fff}
    .toolbar button:nth-child(3){background:rgba(224,103,83,.56);color:#fff}
    .sleep{grid-column:1/-1;background:rgba(206,143,56,.54);color:#fff}
    .section-title{font-size:20px;font-weight:900;margin:0}
    .muted{margin-top:4px;color:rgba(17,24,39,.68);font-size:14px;font-weight:750}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .light{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;border-radius:16px;padding:14px}
    .name{font-size:17px;font-weight:900;overflow-wrap:anywhere}
    .room{margin-top:2px;font-size:13px;font-weight:750;color:rgba(17,24,39,.66)}
    .switch{min-width:92px;background:rgba(255,255,255,.48)}
    .toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%) translateY(18px);z-index:20;width:min(420px,calc(100% - 28px));padding:12px 14px;border-radius:16px;background:rgba(17,24,39,.90);color:#fff;font-weight:850;text-align:center;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (max-width:560px){.shell{padding:14px}.toolbar{grid-template-columns:1fr}header{flex-direction:column}.home-btn,.local-btn{width:100%}h1{font-size:25px}.light{grid-template-columns:1fr}.switch{width:100%}}
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>高天之光 许珀里翁</h1>
        <div id="status" class="status">预览模式</div>
      </div>
      <a class="home-btn" href="../">返回主页</a>
    </header>

    <div id="notice" class="notice"></div>

    <section class="panel">
      <a class="local-btn" href="http://192.168.1.105:8788">连接家里 WiFi 后进入本地控制</a>
    </section>

    <section class="toolbar">
      <button type="button" data-locked>刷新</button>
      <button type="button" data-locked>全屋开灯</button>
      <button type="button" data-locked>全屋关灯</button>
      <button class="sleep" type="button" data-locked>睡眠模式</button>
    </section>

    <section class="panel">
      <h2 class="section-title">灯光</h2>
      <div class="muted">9 个灯光回路</div>
    </section>

    <section class="grid" id="lights"></section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const LOCAL_LABEL = '请先连接家里的 WiFi，再点“进入本地控制”。';
    const lights = [
      ['玄关灯带','玄关'],['玄关射灯','玄关'],['客厅吊灯','客厅'],['客厅射灯','客厅'],['餐厅吊灯','餐厅'],
      ['餐厅射灯','餐厅'],['衣帽间','主卧'],['主卧吊灯','主卧'],['主卧射灯','主卧']
    ];
    const lightsEl = document.getElementById('lights');
    const toastEl = document.getElementById('toast');
    const statusEl = document.getElementById('status');
    const noticeEl = document.getElementById('notice');
    lightsEl.innerHTML = lights.map(([name, room]) => (
      '<article class="light"><div><div class="name">' + name + '</div><div class="room">' + room + '</div></div><button class="switch" type="button" data-locked>操作</button></article>'
    )).join('');
    function showToast(message){
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 2600);
    }
    function syncOnline(){
      const online = navigator.onLine;
      statusEl.textContent = online ? '预览模式' : '请联网';
      noticeEl.textContent = online ? '现在可以查看界面。真正操作需要回家连接同一个 WiFi 后进入本地控制。' : '当前没有联网，请先联网后再打开页面。';
      noticeEl.classList.add('show');
    }
    document.addEventListener('click', (event) => {
      if (event.target.closest('[data-locked]')) showToast(navigator.onLine ? LOCAL_LABEL : '请先联网。');
    });
    window.addEventListener('online', syncOnline);
    window.addEventListener('offline', syncOnline);
    syncOnline();
  </script>
</body>
</html>
